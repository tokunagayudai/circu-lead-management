<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>リード管理 | Circulation Enterprise</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--blue:#0079C0;--blue-d:#003d5e;--blue-mid:#5599be;--blue-l:#e8f6ff;--grn:#22a047;--grn-bg:#e6f7ee;--org:#ed7d31;--red:#cf222e;--purple:#7057a3;
--bg:#eef6fc;--bg2:#fff;--bd:#d6e8f5;--ink:#1a2a38;--ink2:#566b7a;--ink3:#8fa3b3;
--mono:'JetBrains Mono','SF Mono',Consolas,monospace;--sans:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:linear-gradient(160deg,#e8f6ff 0%,#d8eefb 100%);background-attachment:fixed;color:var(--ink);font-size:13px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:56px;background:#003d5e;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;z-index:100;overflow-y:auto}
.ni{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8b949e;font-size:18px;transition:.15s;flex-direction:column;gap:1px}
.ni .nl{font-size:7px;letter-spacing:.3px}
.ni:hover,.ni.act{background:var(--blue);color:#fff}
.logo-s{width:36px;height:36px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;margin-bottom:12px}
#M{margin-left:0;min-height:100vh;padding-top:52px}
/* Top navigation bar with 2 major categories */
.topnav{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#0079c0,#005a92);display:flex;align-items:center;gap:10px;z-index:200;padding:0 18px;box-shadow:0 2px 12px rgba(0,121,192,.25)}
.topnav .tn-logo{color:#fff;font-weight:900;font-size:18px;background:rgba(255,255,255,.18);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topnav .tn-portal{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.topnav .tn-portal:hover .tn-portal-name{text-decoration:underline}
.topnav .tn-portal-name{color:#fff;font-weight:800;font-size:14px;letter-spacing:.01em}
.topnav .tn-badge{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:600;flex-shrink:0}
.topnav .tn-div{width:1px;height:22px;background:rgba(255,255,255,.25);margin:0 4px;flex-shrink:0}
.topnav .tn-sub{color:rgba(255,255,255,.6);font-size:11px;white-space:nowrap}
.topnav .tn-back{display:inline-flex;align-items:center;gap:5px;color:#fff;text-decoration:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;white-space:nowrap;transition:.15s}
.topnav .tn-back:hover{background:rgba(255,255,255,.28)}
@media(max-width:640px){.topnav .tn-sub,.topnav .tn-portal-name{display:none}}
.tn-section{display:flex;flex-direction:column;padding:4px 16px;position:relative;min-width:0}
.tn-section.biz{background:rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.08)}
.tn-section.ap{background:rgba(255,255,255,.04)}
.tn-section.biz::before,.tn-section.ap::before{display:none}
.tn-section .tn-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.8px;font-weight:700;margin-top:4px;margin-bottom:2px;text-transform:uppercase}
.tn-section.biz .tn-label,.tn-section.ap .tn-label{color:rgba(255,255,255,.45)}
.tn-section .tn-btns{display:flex;gap:4px}
.topnav .tn-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.55);transition:.15s;border:none;background:none;white-space:nowrap}
.topnav .tn-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.tn-section.biz .tn-btn.act,.tn-section.ap .tn-btn.act{color:#fff;background:rgba(255,255,255,.2)}
.tn-section.ld{background:rgba(255,255,255,.04);border-left:1px solid rgba(255,255,255,.08)}.tn-section.ld::before{display:none}.tn-section.ld .tn-label{color:rgba(255,255,255,.45)}.tn-section.ld .tn-btn.act{color:#fff;background:rgba(255,255,255,.2)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 8px;flex-wrap:wrap;gap:8px}
.title{font-size:18px;font-weight:700}.sub{font-size:11px;color:var(--ink3);margin-top:2px}
.filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fl{padding:5px 10px;border:1px solid var(--bd);border-radius:6px;font-size:11px;background:var(--bg2);color:var(--ink);cursor:pointer}
.fl:focus{outline:none;border-color:var(--blue)}

/* === Rakuten-style KPI with cumulative + delta === */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:8px 24px}
.kpi-card{background:var(--bg2);border-radius:10px;padding:14px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
.kpi-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,121,192,.08)}
.kpi-label{font-size:10px;color:var(--ink3);margin-bottom:4px;font-weight:500}
.kpi-val{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1.1}
.kpi-delta{font-size:12px;font-weight:600;margin-top:3px;font-family:var(--mono)}
.kpi-delta.up{color:var(--grn)}.kpi-delta.neutral{color:var(--ink3)}
.kpi-sub{font-size:9px;color:var(--ink3);margin-top:2px}

/* Delta switcher - Rakuten toggle style */
.delta-sw{display:flex;gap:0;background:var(--bg);border-radius:6px;border:1px solid var(--bd);overflow:hidden;margin-left:auto}
.delta-sw .ds{padding:4px 10px;font-size:9px;cursor:pointer;color:var(--ink3);border-right:1px solid var(--bd);transition:.1s;white-space:nowrap}
.delta-sw .ds:last-child{border-right:none}
.delta-sw .ds:hover{color:var(--ink)}
.delta-sw .ds.act{background:var(--blue);color:#fff}

/* Charts & drill */
.rev-panel{background:var(--bg2);border-radius:10px;margin:8px 24px;padding:16px;border:1px solid var(--bd)}
.rev-panel .hd{font-size:12px;font-weight:700;margin-bottom:12px}
.chart-area{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;cursor:pointer}
.bar-pair{display:flex;gap:1px;align-items:flex-end;width:100%}
.bar-pair .b{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:.2s}
.bar-lbl2{font-size:8px;color:var(--ink3);text-align:center;margin-top:3px}
.bar-val{font-size:7px;font-family:var(--mono);color:var(--ink2);text-align:center;margin-bottom:2px}
.bar-margin{font-size:7px;color:var(--org);font-weight:600;text-align:center}
.chart-legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--ink2)}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend .dot{width:8px;height:8px;border-radius:2px}
.drill{max-height:0;overflow:hidden;transition:.2s;margin:0 24px}.drill.show{max-height:3000px;overflow-y:auto}
.drill-hd{display:flex;gap:10px;font-size:9px;font-weight:600;color:var(--ink3);padding:8px 12px;border-bottom:1px solid var(--bd)}
.drill-row{display:flex;gap:10px;align-items:center;padding:7px 12px;font-size:11px;border-bottom:1px solid rgba(0,0,0,.03);cursor:pointer;transition:.08s}
.drill-row:hover{background:rgba(0,121,192,.04)}
.drill-row .co{min-width:80px;font-weight:600;color:var(--ink2);font-size:10px}
.drill-row .nm{min-width:70px;font-weight:600}.drill-row .th{color:var(--ink2);flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-row .dt{font-family:var(--mono);font-size:9px;color:var(--ink3)}.drill-row .sf{font-size:8px;color:var(--blue);font-weight:600}
.pill{font-size:8px;padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.pill-g{background:var(--grn-bg);color:var(--grn)}.pill-a{background:#e0f2fe;color:#0ea5e9}.pill-b{background:#ddf4ff;color:var(--blue)}.pill-o{background:#fff8c5;color:var(--org)}.pill-r{background:#ffebe9;color:var(--red)}.pill-ws{background:#f0e6ff;color:var(--purple)}
.rev-drill{max-height:0;overflow:hidden;transition:.2s;margin-top:8px}.rev-drill.show{max-height:2000px;overflow-y:auto}

/* Company grid - MF style */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;padding:8px 24px}
.co-card{background:var(--bg2);border-radius:10px;padding:14px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
.co-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,121,192,.08)}
.co-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.co-top img{width:28px;height:28px;border-radius:6px;object-fit:contain;background:var(--bg)}
.co-top .name{font-weight:700;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.co-top .fs{font-size:9px;color:var(--ink3)}
.co-metrics{display:flex;gap:0;border-top:1px solid rgba(0,0,0,.04);padding-top:8px}
.co-m{flex:1;text-align:center}.co-m .v{font-size:15px;font-weight:700;font-family:var(--mono);line-height:1.2}.co-m .l{font-size:8px;color:var(--ink3);margin-top:1px}
.co-m+.co-m{border-left:1px solid rgba(0,0,0,.04)}

/* Summary, Layer, Org */
.sum-row{display:flex;gap:0;background:var(--bg2);border-radius:10px;margin:8px 24px;overflow:hidden;border:1px solid var(--bd)}
.sum-i{flex:1;text-align:center;padding:14px 8px;border-right:1px solid rgba(0,0,0,.04)}.sum-i:last-child{border-right:none}
.sum-i .v{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.2}.sum-i .l{font-size:9px;color:var(--ink3);margin-top:3px}
.layer-panel{background:var(--bg2);border-radius:10px;margin:8px 24px;padding:12px 16px;display:flex;align-items:center;gap:16px;border:1px solid var(--bd)}
.layer-panel .hd{font-size:11px;font-weight:700;color:var(--ink2)}
.ly-i{text-align:center;padding:0 12px}.ly-i .v{font-size:18px;font-weight:700;font-family:var(--mono)}.ly-i .l{font-size:8px;color:var(--ink3)}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:6px 24px;font-size:9px;color:var(--ink2)}
.lg-i{display:flex;align-items:center;gap:3px}.lg-d{width:8px;height:8px;border-radius:2px}
.dz{margin:8px 24px;padding:20px;text-align:center;border:2px dashed var(--bd);border-radius:10px;color:var(--ink3);cursor:pointer;transition:.15s;font-size:12px}
.dz:hover{border-color:var(--blue);color:var(--blue)}
.an{display:none;margin:8px 24px;padding:14px;background:var(--bg2);border-radius:10px;font-size:12px;line-height:1.6;border:1px solid var(--bd)}.an.show{display:block}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ck-ring-anim{animation:ckRingPulse 2s ease-in-out infinite}@keyframes ckRingPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(26,127,55,.3))}50%{filter:drop-shadow(0 0 10px rgba(26,127,55,.6))}}
.hint{padding:4px 24px;font-size:9px;color:var(--ink3)}
.drill-modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9998;animation:fadeIn .15s}
.drill-modal{position:fixed;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:9999;display:flex;flex-direction:column;animation:drillSlide .2s ease-out;resize:both;overflow:hidden;min-width:400px;min-height:300px}
@keyframes drillSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.drill-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;cursor:move;user-select:none;background:#fafbfc}
.drill-modal-body{overflow:auto;padding:0;flex:1}
.side-panel{position:fixed;right:0;top:0;height:100%;width:45%;max-width:700px;background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.15);z-index:9999;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease-out}
.side-panel.open{transform:translateX(0)}
.side-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:#fafbfc}
.side-panel-body{overflow:auto;padding:0;flex:1}
.side-panel-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.2);z-index:9998;opacity:0;transition:opacity .2s}
.side-panel-bg.open{opacity:1}
.drill-close{font-size:20px;width:32px;height:32px;border:none;background:rgba(0,0,0,.06);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:.15s}.drill-close:hover{background:rgba(0,0,0,.12)}

/* Org chart */
.org-toolbar{display:flex;gap:6px;padding:6px 24px;align-items:center;flex-wrap:wrap}
.org-toolbar span{font-size:10px;color:var(--ink2);font-weight:700}
.org-toolbar button{padding:3px 10px;font-size:9px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);cursor:pointer;color:var(--ink2)}
.org-toolbar button:hover{border-color:var(--blue);color:var(--blue)}
.org-toolbar .saved{font-size:9px;color:var(--grn);font-weight:600;opacity:0;transition:.3s}.org-toolbar .saved.show{opacity:1}
.dept-filter{display:flex;gap:4px;padding:4px 24px;flex-wrap:wrap}
.dept-btn{padding:3px 8px;font-size:9px;border:1px solid var(--bd);border-radius:12px;background:var(--bg2);cursor:pointer;color:var(--ink2);transition:.1s}
.dept-btn:hover{border-color:var(--blue)}.dept-btn.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.org-canvas{padding:8px 24px 16px;overflow-x:auto;overflow-y:auto;max-height:70vh;-webkit-overflow-scrolling:touch}
.org-root{display:flex;gap:16px;flex-wrap:nowrap;align-items:flex-start;min-width:max-content}
.dc-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
.dc{background:var(--bg2);border-radius:10px;border:1px solid var(--bd);min-width:170px;max-width:420px;transition:.15s;cursor:grab;user-select:none}
.dc:active{cursor:grabbing}
.dc.drag-over-dc{border:2px dashed var(--blue);background:rgba(0,121,192,.03)}
.dc.depth0{border-color:rgba(0,0,0,.08)}.dc.depth1{border-color:rgba(0,121,192,.2)}.dc.depth2{border-color:rgba(191,135,0,.2)}
.dc.grp-co{border:2px solid var(--blue);background:rgba(0,121,192,.03)}
.dc.grp-co>.dc-hd{background:rgba(0,121,192,.08);border-radius:9px 9px 0 0}
.dc-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.04)}
.dc-hd.has-won{background:var(--grn-bg);border-radius:9px 9px 0 0}
.dc-nm{font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-ct{font-size:9px;color:var(--ink3)}
.dc-body{padding:6px}
.dc-people{display:flex;flex-direction:column;gap:3px}
.pc{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.08s;font-size:11px}
.pc:hover{box-shadow:0 1px 4px rgba(0,0,0,.08)}
.pc[draggable=true]{cursor:grab}.pc[draggable=true]:active{cursor:grabbing}
.pc.dragging{opacity:.3}
.sw3{background:rgba(26,127,55,.06)}.sa3{background:rgba(14,165,233,.08)}.sm3{background:rgba(191,135,0,.06)}.sd3{background:rgba(0,121,192,.06)}.sp3{background:rgba(210,153,34,.06)}
.sc3{background:rgba(139,148,158,.04)}.sx3{background:rgba(207,34,46,.04)}.sr3{background:transparent}
.pa{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.pi{min-width:0;flex:1}.pi-n{font-weight:600;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-r{font-size:8px;color:var(--ink2)}.pi-d{font-size:7px;color:var(--ink3);font-family:var(--mono)}
.ps{flex-shrink:0}
.dc-children{display:flex;gap:12px;justify-content:center;padding-top:20px;position:relative}
.dc-children::before{content:'';position:absolute;top:0;left:50%;width:0;height:20px;border-left:2px solid var(--bd)}
.dc-children>.dc-wrap{position:relative}
.dc-children>.dc-wrap::before{content:'';position:absolute;top:-20px;left:0;right:0;height:20px;border-top:2px solid var(--bd)}
.dc-children>.dc-wrap:first-child::before{left:50%;border-left:2px solid var(--bd)}
.dc-children>.dc-wrap:last-child::before{right:50%;left:0;border-right:2px solid var(--bd)}
.dc-children>.dc-wrap:only-child::before{left:50%;right:auto;width:0;border-left:2px solid var(--bd);border-top:none}
.dc-children>.dc-wrap:not(:first-child):not(:last-child)::before{border-top:2px solid var(--bd)}
.dc-drop{min-height:20px;border:1px dashed transparent;border-radius:6px;margin:4px 6px;transition:.15s}
.dc-drop.active{border-color:var(--blue);background:rgba(0,121,192,.06)}

/* Memo popup */
.memo-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center}
.memo-panel{background:#fff;border-radius:12px;width:400px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:20px}
.memo-panel h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.memo-field{margin-bottom:12px}.memo-field label{display:block;font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.memo-field textarea{width:100%;border:1px solid var(--bd);border-radius:6px;padding:8px;font-size:12px;font-family:var(--sans);resize:vertical;min-height:60px}
.memo-field select{width:100%;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:12px;background:#fff}
.memo-field input[type=text]{width:100%;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:12px}
.memo-btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.memo-btn{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--ink)}
.memo-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.memo-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.memo-tag{font-size:7px;padding:1px 4px;border-radius:3px;cursor:pointer;margin-left:2px}
.memo-tag.has{background:#e0f2fe;color:#0ea5e9}.memo-tag.empty{background:var(--bg);color:var(--ink3)}
.memo-preview{position:absolute;z-index:999;background:#003d5e;color:#fff;font-size:10px;padding:8px 10px;border-radius:6px;max-width:220px;line-height:1.5;pointer-events:none;white-space:pre-wrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
/* ── 稼働中リード: company cards & lead table ── */
.co-lead-card{border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:box-shadow .15s}
.co-lead-card:hover{box-shadow:0 5px 20px rgba(0,0,0,.10)}
.co-lead-hdr{padding:11px 18px;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#f5f9ff 0%,#edf4fb 100%);border-bottom:1px solid var(--bd);border-left:4px solid transparent}
.co-lead-hdr.rl-fire{border-left-color:#ef4444;background:linear-gradient(135deg,#fff5f5 0%,#fef2f2 100%)}
.co-lead-hdr.rl-close{border-left-color:#0079C0;background:linear-gradient(135deg,#f0f7ff 0%,#e8f3fc 100%)}
.co-lead-hdr.rl-good{border-left-color:#22a047;background:linear-gradient(135deg,#f0faf3 0%,#e8f7ee 100%)}
.co-lead-hdr.rl-normal{border-left-color:#94a3b8}
.lead-tbl{width:100%;border-collapse:collapse}
.lead-tbl th{padding:7px 10px;text-align:left;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:#f7f9fc;border-bottom:2px solid #e5ecf3;white-space:nowrap}
.lead-tbl td{padding:10px 10px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
.lead-tbl tr.lr:hover td{background:#f0f7ff}
.lead-tbl tr.lr-s td{background:#fffef7;border-left:3px solid #f59e0b}
.lead-tbl tr.lr-s:hover td{background:#fefce8}
.lead-tbl tr.lr-sh td{background:#f1f5f9;padding:6px 10px;font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:.2px}
/* List view */
.list-view{padding:8px 24px}
/* アカプラ ツリー */
.acpt-row{display:flex;gap:0;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.acpt-col{flex:0 0 176px;display:flex;flex-direction:column;align-items:center;position:relative;padding:0 5px}
.acpt-stub{position:relative;width:100%;height:14px;flex-shrink:0}
.acpt-stub::after{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;background:#cbd5e1;transform:translateX(-50%);z-index:1}
.acpt-stub::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:#cbd5e1;z-index:0}
.acpt-col:first-child .acpt-stub::before{left:50%}
.acpt-col:last-child .acpt-stub::before{right:50%}
.acpt-col:only-child .acpt-stub{visibility:hidden}
.acpt-vline{width:2px;height:10px;background:#d1d5db;margin:0 auto;flex-shrink:0}
.acpt-rel-mode .acpt-person{cursor:pointer !important}
.acpt-rel-mode .acpt-person:hover>div{outline:2px dashed #0079C0;border-radius:7px}
.acpt-person.acpt-rel-sel>div{outline:2px solid #0079C0 !important;background:#dbeafe !important;border-radius:7px}
.acpt-persons{width:100%;position:relative;padding-left:8px}
.acpt-persons::before{content:'';position:absolute;left:3px;top:0;bottom:14px;width:2px;background:#e8ecf0}
.acpt-person{position:relative;margin-bottom:5px}
.acpt-person::before{content:'';position:absolute;left:-8px;top:17px;width:8px;height:2px;background:#e8ecf0}
.list-table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.list-table th{font-size:9px;font-weight:600;color:var(--ink3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--bg)}
.list-table td{font-size:11px;padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.03)}
.list-table tr:hover{background:rgba(0,121,192,.03)}
.list-table .memo-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:var(--ink2)}
.view-toggle{display:flex;gap:0;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-left:8px}
.vt-btn{padding:4px 10px;font-size:9px;cursor:pointer;color:var(--ink3);border-right:1px solid var(--bd);transition:.1s}
.vt-btn:last-child{border-right:none}
.vt-btn:hover{color:var(--ink)}.vt-btn.act{background:var(--blue);color:#fff}
/* === Enterprise Analytics === */
.ent-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 8px;flex-wrap:wrap;gap:8px}
.ent-hdr h2{font-size:18px;font-weight:700}.ent-hdr .sub{font-size:11px;color:var(--ink3)}
.ent-tabs{display:flex;gap:2px;padding:4px 24px 8px;flex-wrap:wrap}
.ent-tab{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--ink2);transition:.15s}
.ent-tab:hover{border-color:var(--blue);color:var(--blue)}.ent-tab.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.ent-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:8px 24px}
.ent-kpi{background:var(--bg2);border-radius:10px;padding:14px 16px;border:1px solid transparent;transition:.15s}
.ent-kpi .ek-label{font-size:9px;color:var(--ink3);font-weight:500;margin-bottom:4px}
.ent-kpi .ek-val{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1.1}
.ent-kpi .ek-sub{font-size:10px;color:var(--ink3);margin-top:4px}.ent-kpi .ek-rate{font-size:11px;font-weight:600;margin-top:2px}
.ent-kpi .ek-rate.up{color:var(--grn)}.ent-kpi .ek-rate.down{color:var(--red)}
.ent-section{margin:8px 24px;background:var(--bg2);border-radius:12px;padding:18px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ent-section .es-title{font-size:13px;font-weight:700;margin-bottom:12px;padding-left:10px;border-left:3px solid var(--blue)}
.ent-table{width:100%;border-collapse:collapse;font-size:11px}
.ent-table th{text-align:left;padding:6px 8px;color:var(--ink3);font-size:9px;font-weight:600;border-bottom:1px solid var(--bd)}
.ent-table td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.03)}.ent-table tr:hover{background:rgba(0,121,192,.03)}
/* Recycle drawer */
#rc-drawer{position:fixed;top:0;right:-105vw;width:min(900px,92vw);height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:9999;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#rc-drawer.open{right:0}
#rc-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9998}
#rc-drawer-overlay.open{display:block}
#rc-drawer-body{flex:1;overflow-y:auto;padding:0 16px 24px}
.ent-heat{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);min-width:36px;text-align:center}
.ent-heat.g{background:var(--grn-bg);color:var(--grn)}.ent-heat.y{background:#fff8c5;color:var(--org)}.ent-heat.r{background:#ffebe9;color:var(--red)}.ent-heat.x{background:var(--bg);color:var(--ink3)}
.ent-funnel{display:flex;flex-direction:column;gap:4px;margin:8px 0}
.ent-fb{display:flex;align-items:center;gap:8px}.ent-fb .ef-label{min-width:30px;font-size:10px;font-weight:600;color:var(--ink2);text-align:right}
.ent-fb .ef-bar{height:24px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;min-width:24px;transition:.3s}
.ent-fb .ef-rate{font-size:9px;color:var(--ink3);min-width:40px}
.ent-pl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:8px 0}
.ent-pl{background:var(--bg);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--bd)}
.ent-pl .ep-ph{font-size:9px;font-weight:600;color:var(--ink2)}.ent-pl .ep-n{font-size:22px;font-weight:700;font-family:var(--mono)}
.ent-pl .ep-ck{font-size:9px;color:var(--ink3);margin-top:2px}
.ent-sim{margin:8px 0}.ent-sim-row{display:flex;align-items:center;gap:12px;margin:6px 0;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.03)}
.ent-sim-row label{min-width:130px;font-size:11px;color:var(--ink2)}.ent-sim-row input[type=range]{flex:1;accent-color:var(--blue)}
.ent-sim-row .es-v{min-width:50px;font-size:12px;font-weight:600;font-family:var(--mono);text-align:right}
.ent-forecast{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.ent-fc{background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--bd)}
/* Morning briefing popup */
.mbr-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.mbr-modal{background:#fff;border-radius:16px;width:90%;max-width:780px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mbr-hdr{background:linear-gradient(135deg,#0079c0,#005a92);color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:1}
.mbr-hdr h2{font-size:16px;margin-bottom:4px}.mbr-hdr p{font-size:11px;opacity:.65}
.mbr-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
.mbr-close:hover{background:rgba(255,255,255,.25)}
.mbr-body{padding:16px 20px}
.mbr-sect{margin-bottom:16px}
.mbr-sect-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;font-weight:700}
.mbr-sect-hdr.alert{background:#ffebe9;color:var(--red)}.mbr-sect-hdr.new{background:#dafbe1;color:var(--grn)}.mbr-sect-hdr.zombie{background:#fff8c5;color:var(--org)}
.mbr-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(0,0,0,.04);font-size:11px;cursor:pointer;transition:.1s}
.mbr-row:hover{background:rgba(0,121,192,.04)}
.mbr-row .mr-member{min-width:60px;font-weight:600;color:var(--ink2);font-size:10px}
.mbr-row .mr-name{flex:1;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mbr-row .mr-ph{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.05);color:var(--ink2)}
.mbr-row .mr-days{font-family:var(--mono);font-size:10px;min-width:40px;text-align:right}
.mbr-row .mr-ck{font-family:var(--mono);font-size:10px;min-width:60px;text-align:right;color:var(--ink2)}
.mbr-stat{display:flex;gap:12px;padding:8px 12px;flex-wrap:wrap}
.mbr-stat-item{background:var(--bg);border-radius:8px;padding:10px 14px;flex:1;min-width:100px;text-align:center}
.mbr-stat-item .ms-val{font-size:22px;font-weight:700;font-family:var(--mono)}.mbr-stat-item .ms-label{font-size:9px;color:var(--ink3);margin-top:2px}
.mbr-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 4px}
.mbr-kpi{background:var(--bg);border-radius:8px;padding:10px 12px}
.mbr-kpi .mk-label{font-size:9px;color:var(--ink3);font-weight:600;margin-bottom:4px}
.mbr-kpi .mk-val{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1}
.mbr-kpi .mk-val .mk-target{font-size:10px;color:var(--ink3);font-weight:400;margin-left:2px}
.mbr-kpi .mk-bar{height:5px;background:rgba(0,0,0,.08);border-radius:3px;margin:6px 0 3px;overflow:hidden}
.mbr-kpi .mk-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.mbr-kpi .mk-pct{font-size:9px;font-weight:600;font-family:var(--mono)}
.mbr-fcst-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 4px}
.mbr-fcst-item{background:var(--bg);border-radius:8px;padding:10px 12px;text-align:center}
@media(max-width:640px){.mbr-kpi-row{grid-template-columns:repeat(2,1fr)}.mbr-fcst-row{grid-template-columns:1fr}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* Mascot assistant */
.mascot-wrap{position:fixed;bottom:24px;right:24px;z-index:8000;display:flex;flex-direction:column;align-items:flex-end;gap:0}
.mascot-bubble{display:none;width:380px;max-height:75vh;overflow-y:auto;background:#fff;border-radius:16px 16px 4px 16px;box-shadow:0 8px 32px rgba(0,0,0,.18);margin-bottom:10px;animation:bubbleIn .2s ease-out}
.mascot-bubble.open{display:block}
.mascot-bubble-hdr{background:linear-gradient(135deg,#0079c0,#005a92);color:#fff;padding:14px 16px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
.mascot-bubble-hdr h3{font-size:13px;margin:0}.mascot-bubble-hdr span{font-size:10px;opacity:.6}
.mascot-bubble-body{padding:12px 14px;font-size:11px;line-height:1.6}
.mascot-btn{width:60px;height:60px;border-radius:50%;border:3px solid #fff;background:linear-gradient(135deg,#0079C0,#00a5e0);box-shadow:0 4px 16px rgba(0,121,192,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;position:relative}
.mascot-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,121,192,.45)}
.mascot-btn:active{transform:scale(.95)}
.mascot-badge{position:absolute;top:-4px;right:-4px;background:#cf222e;color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
@keyframes bubbleIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.m-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.m-kpi{background:var(--bg);border-radius:8px;padding:8px 10px}
.m-kpi .mk-l{font-size:9px;color:var(--ink3);font-weight:500}.m-kpi .mk-v{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1.2}.m-kpi .mk-s{font-size:9px;color:var(--ink3)}
.ent-fc .efc-label{font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.ent-fc .efc-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.ent-fc .efc-sub{font-size:9px;color:var(--ink3);margin-top:2px}
.ent-mgr{opacity:.5;background:rgba(0,0,0,.02)}
/* Forecast chart */
.fc-chart{display:flex;align-items:flex-end;gap:4px;height:180px;padding:20px 4px 0;position:relative}
.fc-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}.fc-stack{width:100%;display:flex;flex-direction:column-reverse}
.fc-base{background:var(--blue);border-radius:2px 2px 0 0;min-height:1px;transition:.4s}.fc-pipe{min-height:0;transition:.3s}
.fc-pipe-h{background:rgba(26,127,55,.35)}.fc-pipe-m{background:rgba(234,88,12,.28)}.fc-pipe-l{background:rgba(99,102,241,.22)}
.fc-val{font-size:7px;font-weight:600;color:var(--ink2);text-align:center;margin-bottom:2px;font-family:var(--mono)}
.fc-lbl{font-size:9px;color:var(--ink3);text-align:center;margin-top:4px}.fc-lbl.cur{color:var(--blue);font-weight:700}
.fc-cur{outline:2px solid var(--blue);outline-offset:1px;border-radius:3px}
.fc-legend{display:flex;gap:12px;margin-top:8px;font-size:9px;flex-wrap:wrap}
.fc-leg{display:flex;align-items:center;gap:4px}.fc-leg .dot{width:10px;height:10px;border-radius:2px}
/* Drill overlay */
.ent-drill{max-height:0;overflow:hidden;transition:.2s;margin:0 24px}.ent-drill.show{max-height:none;overflow-y:auto}
/* Tree org chart */
.tree-wrap{padding:16px 24px;overflow:auto;max-height:70vh}
.tree-node{display:flex;flex-direction:column;align-items:center;position:relative}
.tree-box{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;text-align:center;min-width:100px;max-width:200px;position:relative;z-index:1}
.tree-box.has-won{border-color:var(--grn);background:var(--grn-bg)}
.tree-box .tb-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-box .tb-count{font-size:9px;color:var(--ink3)}
.tree-box .tb-lead{font-size:9px;color:var(--ink2);margin-top:2px;cursor:pointer}
.tree-box .tb-lead:hover{color:var(--blue)}
.tree-person{display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
.tree-person .tp-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--bd)}
.tree-person .tp-nm{font-size:9px;font-weight:600;margin-top:2px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-person .tp-role{font-size:7px;color:var(--ink3)}
.tree-children{display:flex;justify-content:center;gap:8px;position:relative;padding-top:20px}
.tree-children::before{content:'';position:absolute;top:0;left:50%;width:0;height:20px;border-left:1px solid var(--bd)}
.tree-children>*{position:relative}
.tree-children>*::before{content:'';position:absolute;top:-20px;left:50%;width:50%;height:20px;border-top:1px solid var(--bd)}
.tree-children>*:first-child::before{left:50%;width:50%;border-left:1px solid var(--bd);border-top:1px solid var(--bd)}
.tree-children>*:last-child::before{right:50%;left:auto;width:50%;border-right:1px solid var(--bd);border-top:1px solid var(--bd)}
.tree-children>*:only-child::before{left:50%;width:0;border-left:1px solid var(--bd);border-top:none}

/* Commerce (Funnel) view */
.funnel-wrap{display:flex;gap:16px;padding:8px 24px;flex-wrap:wrap}
.funnel-bar-area{flex:1;min-width:300px;background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--bd)}
.fb{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fb-label{width:70px;font-size:11px;font-weight:600;text-align:right}
.fb-bar{height:28px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;font-family:var(--mono);color:#fff;min-width:30px;transition:.3s}
.fb-rate{font-size:9px;color:var(--ink3);font-family:var(--mono)}
.heatmap{flex:1;min-width:400px;background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--bd);overflow-x:auto}
.hm-table{width:100%;border-collapse:collapse;font-size:10px}
.hm-table th{padding:5px 6px;font-weight:600;color:var(--ink3);text-align:center;border-bottom:1px solid var(--bd);white-space:nowrap}
.hm-table td{padding:5px 6px;text-align:center;font-family:var(--mono);font-weight:600}
.hm-table tr:hover{background:rgba(0,121,192,.03)}
.hm-name{text-align:left!important;font-weight:700!important;font-family:var(--sans)!important}
.stacked-chart{background:var(--bg2);border-radius:10px;margin:8px 24px;padding:16px;border:1px solid var(--bd)}
.stacked-area{display:flex;align-items:flex-end;gap:2px;height:140px;padding:0 4px}
.st-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
.st-bar{width:100%;border-radius:2px 2px 0 0;cursor:pointer;transition:.2s}
.st-bar:hover{opacity:.8}
.st-lbl{font-size:8px;color:var(--ink3);margin-top:3px;text-align:center}
.st-val{font-size:7px;font-family:var(--mono);color:var(--ink2);text-align:center;margin-bottom:2px}
.loading-msg{padding:40px;text-align:center;color:var(--ink3);font-size:14px}
/* Standalone overrides */
#M{margin-left:0;min-height:100vh;padding-top:52px}
.topnav{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#0079c0,#005a92);display:flex;align-items:center;z-index:200;padding:0 18px;gap:10px;box-shadow:0 2px 12px rgba(0,121,192,.25)}
.topnav .tn-logo{color:#fff;font-weight:900;font-size:18px;background:rgba(255,255,255,.18);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ════ ポータル トンマナ統一 ════ */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#bcd9ef;border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#9ec6e6;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
/* 浮遊する白カード（ホバーで持ち上がる／ブルー基調の影） */
.kpi-card,.co-card,.ent-kpi{background:var(--bg2);border:1.5px solid var(--bd);border-radius:14px;box-shadow:0 2px 10px rgba(0,121,192,.07);transition:transform .15s,box-shadow .15s,border-color .15s}
.kpi-card:hover,.co-card:hover,.ent-kpi:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,121,192,.15);border-color:var(--blue-mid)}
.rev-panel,.sum-row,.layer-panel,.ent-section,.an,.funnel-bar-area,.heatmap,.stacked-chart,.list-table{border:1.5px solid var(--bd);border-radius:14px;box-shadow:0 2px 8px rgba(0,121,192,.05)}

var GAS_URL='https://script.google.com/macros/s/AKfycbwuB-bko02MczlRorWD0qQ7Ch80fLoZd5Gmtwb2BWKDfOLOlOBokjiBNjodupe-r2VF/exec';
var SYNC_STATUS='syncing';
// ===== チーム共有ストレージ同期 =====
// アカプラの編集内容（組織図の移動・合体・メモ・手動追加人物など）を
// GAS経由でスプレッドシート(shared_stateシート)に保存し、全メンバーで共有する。
// GAS側に state_get / state_set が未実装の場合は自動的にローカル保存のみで動作する。
var SHARED_STATE_PREFIXES=['circu_acplan_','circu_lead_'];
var SHARED_DEL='__DEL__';
var _ssQueue={},_ssTimer=null,_ssApplying=false,_ssFailCnt=0,_ssDisabled=false;
function _isSharedStateKey(k){for(var i=0;i<SHARED_STATE_PREFIXES.length;i++)if(k.indexOf(SHARED_STATE_PREFIXES[i])===0)return true;return false;}
(function(){
  var _set=localStorage.setItem.bind(localStorage);
  var _rm=localStorage.removeItem.bind(localStorage);
  window._ssRawSet=_set;window._ssRawRemove=_rm;
  localStorage.setItem=function(k,v){_set(k,v);if(!_ssApplying&&_isSharedStateKey(k)){_ssQueue[k]=String(v);_ssSchedule();}};
  localStorage.removeItem=function(k){_rm(k);if(!_ssApplying&&_isSharedStateKey(k)){_ssQueue[k]=SHARED_DEL;_ssSchedule();}};
})();
function _ssSchedule(){if(_ssDisabled)return;clearTimeout(_ssTimer);_ssTimer=setTimeout(_ssFlush,1200);}
function _ssFlush(){
  if(_ssDisabled)return;
  var items=_ssQueue;_ssQueue={};
  var ks=Object.keys(items);if(!ks.length)return;
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'state_set',items:items})})
    .then(function(r){return r.json();})
    .then(function(j){if(!j||!j.ok)throw new Error('state_set not ok');_ssFailCnt=0;})
    .catch(function(e){
      _ssFailCnt++;
      if(_ssFailCnt>=3){_ssDisabled=true;console.warn('共有同期を停止しました（GAS側にstate_set未実装の可能性）。編集はローカルにのみ保存されます。');return;}
      ks.forEach(function(k){if(!(k in _ssQueue))_ssQueue[k]=items[k];});
      clearTimeout(_ssTimer);_ssTimer=setTimeout(_ssFlush,8000);
      console.warn('共有同期エラー（再試行します）:',e);
    });
}
window.addEventListener('beforeunload',function(){
  if(_ssDisabled)return;
  var ks=Object.keys(_ssQueue);if(!ks.length)return;
  try{navigator.sendBeacon(GAS_URL,JSON.stringify({action:'state_set',items:_ssQueue}));_ssQueue={};}catch(e){}
});
function loadSharedState(){
  return fetch(GAS_URL+'?action=state_get').then(function(r){return r.json();}).then(function(obj){
    if(!obj||typeof obj!=='object')return;
    _ssApplying=true;
    try{
      Object.keys(obj).forEach(function(k){
        if(!_isSharedStateKey(k))return;
        if(obj[k]===SHARED_DEL)window._ssRawRemove(k);
        else window._ssRawSet(k,obj[k]);
      });
      console.log('共有データ読込: '+Object.keys(obj).length+'件');
    }finally{_ssApplying=false;}
  }).catch(function(e){console.warn('共有データ読込エラー（ローカル保存で継続）:',e);});
}

function pCSV(t){
  var rows=[],row=[],c='',q=false,i=0;
  while(i<t.length){
    var ch=t[i];
    if(ch==='"'){
      // doubled-quote inside quoted field = literal "
      if(q&&i+1<t.length&&t[i+1]==='"'){c+='"';i+=2;continue;}
      q=!q;i++;continue;
    }
    if(ch===','&&!q){row.push(c);c='';i++;continue;}
    if(!q&&(ch==='\n'||(ch==='\r'&&(i+1>=t.length||t[i+1]!=='\n')))){
      row.push(c);c='';
      if(row.some(function(x){return x.trim();}))rows.push(row);
      row=[];i++;continue;
    }
    if(!q&&ch==='\r'){i++;continue;}
    // inside quoted field: replace literal newlines with space to keep cell in one value
    if(q&&(ch==='\n'||ch==='\r')){c+=' ';if(ch==='\r'&&i+1<t.length&&t[i+1]==='\n')i++;i++;continue;}
    c+=ch;i++;
  }
  if(c||row.length>0){row.push(c);if(row.some(function(x){return x.trim();}))rows.push(row);}
  if(rows.length===0)return{h:[],r:[]};
  var h=rows[0].map(function(x){return x.trim();});
  var rs=rows.slice(1).filter(function(r){return r.length>=3;}).map(function(r){return r.map(function(x){return x.trim();});});
  return{h:h,r:rs};
}

function eDetect(h){var m={};var kw={member:['^主担当者$'],name:['^案件名$'],lastPh:['^最終到達'],apDate:['^初回アポ'],mendanDate:['^面談日$'],firstMendanDate:['^初回面談設定日','初回面談'],closeDate:['^受注予定日'],dealType:['^新規[/／]継続'],channel:['^施策区分[_]?[23]','^施策区分'],ck:['^#?\\s*CK$','^CK$','^#\\s*CK$'],deadReason:['^DEAD理由$'],startDate:['^契約開始'],endDate:['^契約終了'],billM:['月額.*顧客請求','月額.*請求'],payM:['月額.*専門家','月額.*支払'],cancel:['^解約日$'],oppId:['^案件\\s?ID$','Opportunity ID'],mfj:['^Manager Forecast Judge$','^Manager Forecast'],recycle:['^リサイクル選択','ISリサイクル','FSリサイクル','リサイクル.*判定','リサイクル.*種別'],recycleDate:['リサイクル.*次回希望日','リサイクル.*次回','^リサイクル希望日','リサイクル希望','リサイクル予定日','リサイクル日付','リサイクル.*日'],recycleTarget:['^リサイクルターゲット','リサイクルターゲット'],custContact:['^顧客担当者$','^顧客担当者氏名$','顧客担当者'],account:['^取引先名$'],createDate:['^作成日$'],proposalDate:['人選結果メール初回送付日','人選結果メール','提案実施日','提案日'],jinsen:['^人選$','^人選ステータス'],nextAct:['^ネクストアクション$'],nextDate:['^ネクストアクション実施日'],mutual:['Mutual Close'],copyCancel:['^コピー元案件解約チェック','コピー元.*解約'],cancelStatus:['^解約承認ステータス'],cancelMinusCK:['^解約時.*CK','解約時マイナス'],focus:['^注力案件$'],contractClass:['^契約クラス$'],proposalClass:['^提案クラス$'],theme:['^テーマ$','^案件テーマ'],themePartner:['^テーマパートナー'],caseType:['^案件種別テキスト$','^案件種別$','案件種別']};for(var k in kw){m[k]=-1;for(var w=0;w<kw[k].length;w++){for(var i=0;i<h.length;i++){var hvs=(h[i]||'').toString().trim();if(hvs.match(new RegExp(kw[k][w]))){m[k]=i;break;}}if(m[k]>=0)break;}}

  console.log('COL_MAP:',JSON.stringify({ck:m.ck,mfj:m.mfj,curPh:m.curPh,cancel:m.cancel,cancelStatus:m.cancelStatus,recycle:m.recycle,recycleDate:m.recycleDate,custContact:m.custContact}));
  console.log('ALL_HEADERS:',h.map(function(v,i){return i+':'+v;}).join(' | '));

function ePnNewMonthly(mfFilter,reskFilter){
  var data=window.E_PN_NEW;var col=window.E_PN_NEW_COL;
  if(!data||!col||col.ym<0)return null;
  // acplan_pn(E_PN2)からoppId→月額請求マップを毎回ビルド（pn_newの請求額列が空の場合のフォールバック）
  var _pfCol=window.E_PN_COL||{};
  var _pnBillMap={};
  if(_pfCol.oppId>=0){
    (window.E_PN2||[]).forEach(function(pnr){
      var oid=(pnr[_pfCol.oppId]||'').toString().trim();
      var b=_pfCol.bill>=0?parseInt(((pnr[_pfCol.bill]||'0').toString()).replace(/[,\s¥円]/g,''))||0:0;
      var p2=_pfCol.pay>=0?parseInt(((pnr[_pfCol.pay]||'0').toString()).replace(/[,\s¥円]/g,''))||0:0;
      if(oid&&(b>0||p2>0))_pnBillMap[oid]={bill:b,pay:p2};
    });
  }
  console.log('_pnBillMap: entries='+Object.keys(_pnBillMap).length+' E_PN_COL={oppId:'+_pfCol.oppId+',bill:'+_pfCol.bill+',pay:'+_pfCol.pay+'}');
  var TEAM_NAMES=['徳永','栫','中村','岡部','福本','飯田','木曽'];
  var _thMap=window.E_THEME_MAP||{};
  var byMonth={};var seen={};
  data.forEach(function(r){
    var member=(col.member>=0?(r[col.member]||''):'').toString().trim();
    var ym=(col.ym>=0?(r[col.ym]||''):'').toString().trim();
    if(!ym||ym.length<6)return;
    // 対象年月を YYYY/MM形式に正規化
    ym=ym.replace(/-/g,'/');if(ym.length===7)ym=ym;else if(ym.length===6)ym=ym.substring(0,4)+'/'+ym.substring(4);
    if(ym.length>=10)ym=ym.substring(0,7);
    // PN/PKマップで月別PK担当者を取得
    var origMember=member;
    var _pnN=(col.name>=0?(r[col.name]||''):'').toString().trim();
    var _pnOid=(col.oppId>=0?(r[col.oppId]||''):'').toString().trim();
    var _pkById=window.E_PK_OWNER_MAP;var _pkByNm=window.E_PK_OWNER_BY_NAME;
    if(_pkById&&_pnOid&&_pkById[_pnOid]&&_pkById[_pnOid][ym])member=_pkById[_pnOid][ym];
    else if(_pkByNm&&_pnN&&_pkByNm[_pnN]&&_pkByNm[_pnN][ym])member=_pkByNm[_pnN][ym];
    var isTeam=false;TEAM_NAMES.forEach(function(t){if(member.indexOf(t)>=0)isTeam=true;});
    if(!isTeam)return;
    if(mfFilter&&mfFilter!=='all'&&member.indexOf(mfFilter.split(' ')[0])<0)return;
    // リスキリングフィルター（案件IDでテーママップ参照）
    if(reskFilter&&reskFilter!=='all'){var _th2=_thMap[_pnOid]||'';var _isR2=_th2&&_th2.indexOf('リスキリング')>=0;if(reskFilter==='exclude'&&_isR2)return;if(reskFilter==='only'&&!_isR2)return;}
    var _billCol=col.billM>=0?col.billM:col.bill;
    var _payCol=col.payM>=0?col.payM:col.pay;
    var bill=parseInt(((_billCol>=0?(r[_billCol]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    var payV=parseInt(((_payCol>=0?(r[_payCol]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    var pk=parseInt(((col.pk>=0?(r[col.pk]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    if(pk===0&&bill>0)pk=bill-payV;
    var oppId=(col.oppId>=0?(r[col.oppId]||''):'').toString().trim();
    if(!byMonth[ym])byMonth[ym]={rev:0,pk:0,pn:0,cases:[]};

}

var L_DATA=null,L_HEADER=null,L_COL={},L_LOADING=false,L_LOADED=false;
var L_MEMBER_FILTER='all',L_TIER_FILTER='all',L_TARGET_FILTER='all',L_ACTIVE_ONLY=false,L_SEARCH='',L_SORT='company',L_SORT_DIR='asc';
// L_VIEW_MODE: 'all' | 'active' | 'dormant' | 'unproposed' | 'analytics'
var L_VIEW_MODE='all';
var L_ANALYTICS_MEMBER='all'; // analytics tab member filter (independent of list filter)
// "確定リード" = 法人_KOMON/NOMAD担当者 が以下メンバーのいずれか
var L_TEAM=['小林 暁飛','徳永 雄大','栫 英輝','中村 春香','岡部 瑛美','福本 悠太','飯田 知美','木曽 嘉己','土田 真矢'];
var L_MEMBER_COLORS=Object.assign({'小林 暁飛':'#6366f1'},E_MEMBER_COLORS);

function lDetectCols(h){
  var c={company:-1,name:-1,lastName:-1,firstName:-1,member:-1,tier:-1,targetCat:-1,status:-1,approachStatus:-1,la:-1,recycle:-1,dept:-1,deptClass:-1,role:-1,recycleDate:-1,notes:-1,phone:-1,mobile:-1,email:-1,nextActionDate:-1,contactId:-1,accountId:-1};
  h.forEach(function(v,i){
    var s=(v||'').trim();
    if(s.indexOf('KOMON')>=0||s.indexOf('NOMAD')>=0)c.member=i;
    // 会社名列: 完全一致のみ（部分一致で誤検出しないよう厳密に）
    else if((s==='取引先名'||s==='企業名'||s==='法人名'||s==='会社名')&&c.company<0)c.company=i;
    else if(s.indexOf('Tier')>=0||s.indexOf('ティア')>=0)c.tier=i;
    // ターゲット/カテゴリ → targetCat (キーマン/チャンピオン/決裁者 etc), NOT tier
    else if(s.indexOf('ターゲット')>=0||s.indexOf('カテゴリ')>=0)c.targetCat=i;
    else if(s.indexOf('アプローチ')>=0&&s.indexOf('ステータス')>=0&&c.approachStatus<0)c.approachStatus=i;
    else if((s.indexOf('ステータス')>=0||s==='状態')&&c.status<0)c.status=i;
    else if(s.indexOf('最終活動')>=0)c.la=i;
    else if(s.indexOf('リサイクル予定日')>=0||s.indexOf('リサイクル希望')>=0||s.indexOf('リサイクル日')>=0||s.indexOf('アポ予定')>=0||(s.indexOf('リサイクル')>=0&&s.indexOf('日')>=0))c.recycleDate=i;
    else if(s.indexOf('リサイクル')>=0&&c.recycle<0)c.recycle=i;
    else if((s.indexOf('氏名')>=0||s.indexOf('名前')>=0||s.indexOf('担当者名')>=0)&&c.name<0)c.name=i;
    else if(s==='姓'&&c.lastName<0)c.lastName=i;
    else if(s==='名'&&c.firstName<0)c.firstName=i;
    else if(s==='部署クラス'&&c.deptClass<0)c.deptClass=i;
    else if((s.indexOf('部署')>=0||s.indexOf('所属')>=0)&&c.dept<0)c.dept=i;
    else if((s.indexOf('役職')>=0||s.indexOf('職位')>=0)&&c.role<0)c.role=i;
    // 備考 → tier (contains Tier1/Tier2/Tier3/Tier4)
    else if(s==='備考'){c.tier=i;c.notes=i;}
    else if((s==='電話'||s.indexOf('電話番号')>=0)&&c.phone<0)c.phone=i;
    else if((s==='携帯'||s.indexOf('携帯電話')>=0)&&c.mobile<0)c.mobile=i;
    else if((s==='メール'||s.indexOf('メールアドレス')>=0||s.indexOf('Email')>=0)&&c.email<0)c.email=i;
    else if((s.indexOf('次回アクション')>=0||s.indexOf('ネクストアクション')>=0||s.indexOf('NextAction')>=0)&&(s.indexOf('日')>=0||s.indexOf('Date')>=0)&&c.nextActionDate<0)c.nextActionDate=i;
    else if((s.indexOf('取引先責任者')>=0||s.indexOf('コンタクトID')>=0||s.indexOf('ContactId')>=0||s.indexOf('Contact ID')>=0)&&s.indexOf('ID')>=0&&c.contactId<0)c.contactId=i;
    else if((s==='取引先ID'||s==='取引先 ID'||s.indexOf('AccountId')>=0||s.indexOf('Account ID')>=0)&&c.accountId<0)c.accountId=i;
  });
  // fallback
  if(c.company<0)c.company=0;
  return c;
}

function showLeads(){
  document.querySelectorAll('.tn-btn').forEach(function(e){e.classList.remove('act');});
  var nl=document.getElementById('nl');if(nl)nl.classList.add('act');
  var M=document.getElementById('M');
  if(!L_LOADED&&!L_LOADING){
    L_LOADING=true;
    M.innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)"><div style="font-size:20px;margin-bottom:12px">👥</div>リードデータを取得中...</div>';
    fetch(GAS_URL+'?sheet=all_lead').then(function(r){return r.text();}).then(function(t){
      if(!t||t.length<50){L_LOADING=false;M.innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">リードデータを取得できませんでした</div>';return;}
      var p=pCSV(t);L_HEADER=p.h;L_DATA=p.r;L_COL=lDetectCols(p.h);
      L_LOADING=false;L_LOADED=true;
      console.log('all_lead: '+L_DATA.length+'行 cols='+JSON.stringify(L_COL)+' headers='+L_HEADER.slice(0,20).join('|'));
      renderLeads(M);
    }).catch(function(e){L_LOADING=false;M.innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">取得エラー: '+e.message+'</div>';});
  } else {
    renderLeads(M);
  }
}

// ===== 未来パイプライン（リサイクル）分析 =====
function renderRecyclePipeline(){
  if(!window.E_ROWS||!window.E_ROWS.length)return '';
  var today=new Date();today.setHours(0,0,0,0);
  var TEAM5=['徳永 雄大','栫 英輝','中村 春香','岡部 瑛美','福本 悠太','木曽 嘉己','飯田 知美'];
  function matchMember(mem){for(var i=0;i<TEAM5.length;i++){if(mem&&mem.indexOf(TEAM5[i].split(' ')[0])>=0)return TEAM5[i];}return null;}
  // 提案中・過去稼働は acplan_cases (E_ROWS)、リサイクル候補は all_cases (RC_ROWS) から集計する。
  // ※acplan_cases にはリサイクル列が無い。リサイクル選択／リサイクル：次回希望日 は all_cases（案件レポート）にのみ存在する。
  var RC=window.RC_ROWS||[];
  var hasRc=(RC_COL.recycle>=0||RC_COL.recycleDate>=0);
  function rcGet(r,k){var i=RC_COL[k];return (i>=0&&i<r.length)?(r[i]||'').trim():'';}
  var RC_NEG=/不要|無し|なし|対象外|済|完了|クローズ|^[-−ー×]+$|^no$/i;
  // リサイクル選択が「回っている」肯定値か（「リサイクル不要」等は除外）
  function rcIsActive(r){var v=rcGet(r,'recycle');return !!(v&&!RC_NEG.test(v));}
  // リサイクル選択の値からFS/IS区分を判定
  var RC_CAT_C={FS:'#0891b2',IS:'#db2777'};
  function rcCategory(r){var v=rcGet(r,'recycle')||'';if(/FS/i.test(v))return 'FS';if(/IS/i.test(v))return 'IS';return null;}
  // リサイクル：次回希望日 のパース（YYYY/MM・YYYY年M月 等。TimeFrameラベルは日付なし扱い）
  function rcParseDate(r){
    var v=rcGet(r,'recycleDate');if(!v)return null;
    var m=v.match(/(\d{4})[\/\-.年](\d{1,2})/);
    if(!m)return null;
    var d=new Date(parseInt(m[1]),parseInt(m[2])-1,1);
    return isNaN(d.getTime())?null:d;
  }
  function rcYM(r){
    var d=rcParseDate(r);
    if(d)return d.getFullYear()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
    if(rcIsActive(r))return '日付未設定';
    return null;
  }
  // Build member stats
  var byMem={};
  TEAM5.forEach(function(m){byMem[m]={active:[],recycles:[],past08:[]};});
  // 提案中(フェーズ01〜07) / 過去稼働(フェーズ08・契約終了済) は acplan_cases
  E_ROWS.forEach(function(r){
    var mem=eGet(r,'member');var mk=matchMember(mem);if(!mk)return;
    var ph=eGet(r,'curPh');var phN=ePh(ph);var isDead=ph.indexOf('DEAD')>=0;
    if(!isDead&&phN>=1&&phN<=7){byMem[mk].active.push(r);}
    else if(phN===8){var ed=eGet(r,'endDate');if(ed){var d2=new Date(ed.replace(/\//g,'-'));if(!isNaN(d2)&&d2<today)byMem[mk].past08.push(r);}}
  });
  // リサイクル候補は all_cases（リサイクル選択が肯定値 or 未来のリサイクル希望日を持つ案件）
  RC.forEach(function(r){
    var mem=rcGet(r,'member');var mk=matchMember(mem);if(!mk)return;
    var d=rcParseDate(r);
    var keep=rcIsActive(r)||(d&&d>=today);
    if(keep)byMem[mk].recycles.push(r);
  });
  // Team totals — computed FIRST so debug panel can use them
  var totA=0,totR=0,totP=0;TEAM5.forEach(function(m){totA+=byMem[m].active.length;totR+=byMem[m].recycles.length;totP+=byMem[m].past08.length;});
  // Debug info — always visible so user can verify column detection
  var selSamples=[],rdSamples=[];
  if(hasRc)RC.forEach(function(r){
    var s=rcGet(r,'recycle');if(s&&selSamples.indexOf(s)<0&&selSamples.length<10)selSamples.push(s);
    var v=rcGet(r,'recycleDate');if(v&&rdSamples.indexOf(v)<0&&rdSamples.length<10)rdSamples.push(v);
  });
  // Next 6 months + 日付未設定
  var months=[];for(var i=0;i<6;i++){var d=new Date(today.getFullYear(),today.getMonth()+i,1);months.push(d.getFullYear()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1));}
  var allMonths=months.concat(['日付未設定']);
  // recycle count by member × month
  var rcByMemMo={};
  TEAM5.forEach(function(m){rcByMemMo[m]={};allMonths.forEach(function(mo){rcByMemMo[m][mo]=[];});});
  TEAM5.forEach(function(mk){
    byMem[mk].recycles.forEach(function(r){var ym=rcYM(r);if(ym&&rcByMemMo[mk][ym])rcByMemMo[mk][ym].push(r);});
  });
  var h='<div class="ent-section">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  h+='<div class="es-title" style="margin:0">🔄 未来パイプライン分析</div>';
  h+='<details style="font-size:10px"><summary style="cursor:pointer;color:var(--ink3);list-style:none">⚙ データ確認</summary>';
  h+='<div style="position:absolute;z-index:50;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-size:10px;line-height:1.9;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:480px;margin-top:4px">';
  h+='<b>all_cases 列:</b> リサイクル選択=col'+(RC_COL.recycle>=0?RC_COL.recycle:'未検出')+' / リサイクル希望日=col'+(RC_COL.recycleDate>=0?RC_COL.recycleDate:'未検出')+'<br>';
  h+='<b>リサイクル候補:</b> '+totR+'件（'+RC.length+'行中）';
  if(!RC.length)h+='<br><b style="color:var(--red)">⚠ all_cases 未取得</b>';
  else if(!hasRc)h+='<br><b style="color:var(--red)">⚠ リサイクル列が見つかりません</b>';
  h+='</div></details></div>';

  // ===== KPI カード =====
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';
  var kpis=[
    {icon:'📊',l:'提案中',v:totA,sub:'フェーズ 01〜07',bg:'linear-gradient(135deg,#eff6ff,#dbeafe)',border:'#93c5fd',num:'#1d4ed8'},
    {icon:'🔄',l:'リサイクル候補',v:totR,sub:'DEAD → 再アプローチ予定',bg:'linear-gradient(135deg,#faf5ff,#ede9fe)',border:'#c4b5fd',num:'#6d28d9'},
    {icon:'✅',l:'過去稼働',v:totP,sub:'稼働終了・再提案候補',bg:'linear-gradient(135deg,#f0fdf4,#dcfce7)',border:'#86efac',num:'#15803d'}
  ];
  kpis.forEach(function(s){
    h+='<div style="background:'+s.bg+';border:1px solid '+s.border+';border-radius:12px;padding:16px 18px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">';
    h+='<span style="font-size:16px">'+s.icon+'</span>';
    h+='<span style="font-size:11px;font-weight:600;color:#475569">'+s.l+'</span>';
    h+='</div>';
    h+='<div style="font-size:38px;font-weight:800;font-family:var(--mono);color:'+s.num+';line-height:1">'+s.v+'</div>';
    h+='<div style="font-size:10px;color:#64748b;margin-top:5px">'+s.sub+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // ===== 月別バーチャート（FS/IS 内訳）=====
  var _pMoTot={},_pMoFS={},_pMoIS={},_pMoOther={};
  months.forEach(function(mo){
    var fs=0,is=0,tot=0;
    TEAM5.forEach(function(m){(rcByMemMo[m][mo]||[]).forEach(function(r){tot++;var c=rcCategory(r);if(c==='FS')fs++;else if(c==='IS')is++;});});
    _pMoTot[mo]=tot;_pMoFS[mo]=fs;_pMoIS[mo]=is;_pMoOther[mo]=tot-fs-is;
  });
  var _pMaxMo=0;months.forEach(function(mo){if((_pMoTot[mo]||0)>_pMaxMo)_pMaxMo=_pMoTot[mo]||0;});
  var nowMo=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  if(_pMaxMo>0){
    h+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:16px">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
    h+='<div style="font-size:11px;font-weight:700;color:#334155">📅 月別リサイクル候補件数（チーム計・FS/IS内訳）</div>';
    h+='<div style="display:flex;gap:12px;font-size:10px">';
    h+='<span style="display:flex;align-items:center;gap:4px;color:#334155"><span style="width:8px;height:8px;background:'+RC_CAT_C.FS+';border-radius:2px;display:inline-block"></span>FSリサイクル</span>';
    h+='<span style="display:flex;align-items:center;gap:4px;color:#334155"><span style="width:8px;height:8px;background:'+RC_CAT_C.IS+';border-radius:2px;display:inline-block"></span>ISリサイクル</span>';
    h+='<span style="display:flex;align-items:center;gap:4px;color:#94a3b8"><span style="width:8px;height:8px;background:#cbd5e1;border-radius:2px;display:inline-block"></span>その他</span>';
    h+='</div></div>';
    h+='<div style="display:flex;align-items:flex-end;gap:8px;height:130px">';
    months.forEach(function(mo){
      var cnt=_pMoTot[mo]||0;
      var scale=cnt>0?90/_pMaxMo:0;
      var hFS=(_pMoFS[mo]>0)?Math.max(2,Math.round(_pMoFS[mo]*scale)):0;
      var hIS=(_pMoIS[mo]>0)?Math.max(2,Math.round(_pMoIS[mo]*scale)):0;
      var hOther=(_pMoOther[mo]>0)?Math.max(2,Math.round(_pMoOther[mo]*scale)):0;
      var isCur=(mo===nowMo);
      var title='FS:'+(_pMoFS[mo]||0)+'件 / IS:'+(_pMoIS[mo]||0)+'件'+(_pMoOther[mo]?' / その他:'+_pMoOther[mo]+'件':'');
      h+='<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px" title="'+title+'">';
      h+='<div style="font-size:11px;font-weight:700;font-family:var(--mono);color:'+(cnt>0?(isCur?'#1d4ed8':'#334155'):'#cbd5e1')+'">'+cnt+'</div>';
      h+='<div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:90px">';
      if(hOther)h+='<div style="width:100%;background:#cbd5e1;height:'+hOther+'px"></div>';
      if(hIS)h+='<div style="width:100%;background:'+RC_CAT_C.IS+';height:'+hIS+'px"></div>';
      if(hFS)h+='<div style="width:100%;background:'+RC_CAT_C.FS+';border-radius:5px 5px 0 0;height:'+hFS+'px"></div>';
      if(!hFS&&!hIS&&!hOther)h+='<div style="width:100%;background:#f1f5f9;height:2px;border-radius:2px"></div>';
      h+='</div>';
      h+='<div style="font-size:10px;font-weight:'+(isCur?'800':'500')+';color:'+(isCur?'#1d4ed8':'#94a3b8')+'">'+mo.slice(5)+'月'+(isCur?' ●':'')+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // ===== 担当者別テーブル =====
  var totByMo={};months.forEach(function(mo){totByMo[mo]=0;TEAM5.forEach(function(m){totByMo[mo]+=(rcByMemMo[m][mo]||[]).length;});});
  var totNoDate=TEAM5.reduce(function(s,m){return s+(rcByMemMo[m]['日付未設定']||[]).length;},0);
  var maxCellN=0;months.forEach(function(mo){TEAM5.forEach(function(m){var n=(rcByMemMo[m][mo]||[]).length;if(n>maxCellN)maxCellN=n;});});

  // 会社→Tierマップ（L_DATAから）※ drawer data より前に必要
  var coTierMap={};
  if(window.L_DATA&&window.L_COL){var _lc=window.L_COL;L_DATA.forEach(function(r){var co=(_lc.company>=0?(r[_lc.company]||''):'').trim();var t=normTier((_lc.tier>=0?(r[_lc.tier]||''):'').trim());if(co&&t&&!coTierMap[co])coTierMap[co]=t;});}
  var TIER_C={'Tier1':'#3b82f6','Tier2':'#10b981','Tier3':'#f59e0b','Tier4':'#8b5cf6'};

  // Store drawer data
  window._rcDrawerData={};
  var allRcRows=[];TEAM5.forEach(function(m){allRcRows=allRcRows.concat(byMem[m].recycles||[]);});
  window._rcDrawerData['team__all']={title:'チーム全リサイクル ('+allRcRows.length+'件)',rows:allRcRows,isRecycleCase:true};
  months.forEach(function(mo){var rs=[];TEAM5.forEach(function(m){rs=rs.concat(rcByMemMo[m][mo]||[]);});if(rs.length)window._rcDrawerData['team__'+mo]={title:mo+'月 チームリサイクル ('+rs.length+'件)',rows:rs,isRecycleCase:true};});
  TEAM5.forEach(function(mk){
    // 月別
    allMonths.forEach(function(mo){var rows=rcByMemMo[mk][mo];if(!rows||!rows.length)return;window._rcDrawerData[mk+'__'+mo]={title:mk.split(' ')[0]+' / '+(mo==='日付未設定'?'日付未設定':mo+'月')+' リサイクル ('+rows.length+'件)',rows:rows,isRecycleCase:true};});
    // 全件
    var allRows=byMem[mk].recycles;if(allRows.length)window._rcDrawerData[mk+'__all']={title:mk.split(' ')[0]+' リサイクル全件 ('+allRows.length+'件)',rows:allRows,isRecycleCase:true};
    // Tier別
    ['Tier1','Tier2','Tier3','Tier4'].forEach(function(t){var tr=allRows.filter(function(r){return coTierMap[rcGet(r,'account').trim()]===t;});if(tr.length)window._rcDrawerData[mk+'__'+t]={title:mk.split(' ')[0]+' / '+t+' リサイクル ('+tr.length+'件)',rows:tr,isRecycleCase:true};});
    // FS/IS別
    ['FS','IS'].forEach(function(cat){var tr=allRows.filter(function(r){return rcCategory(r)===cat;});if(tr.length)window._rcDrawerData[mk+'__'+cat]={title:mk.split(' ')[0]+' / '+cat+'リサイクル ('+tr.length+'件)',rows:tr,isRecycleCase:true};});
  });
  // チーム全体 Tier別
  ['Tier1','Tier2','Tier3','Tier4'].forEach(function(t){var tr=allRcRows.filter(function(r){return coTierMap[rcGet(r,'account').trim()]===t;});if(tr.length)window._rcDrawerData['team__'+t]={title:'チーム全体 / '+t+' リサイクル ('+tr.length+'件)',rows:tr,isRecycleCase:true};});
  // チーム全体 FS/IS別
  ['FS','IS'].forEach(function(cat){var tr=allRcRows.filter(function(r){return rcCategory(r)===cat;});if(tr.length)window._rcDrawerData['team__'+cat]={title:'チーム全体 / '+cat+'リサイクル ('+tr.length+'件)',rows:tr,isRecycleCase:true};});

  function tierDots(rows){
    var tc={};rows.forEach(function(r){var ac=rcGet(r,'account').trim();var t=coTierMap[ac]||'?';tc[t]=(tc[t]||0)+1;});
    var out='';['Tier1','Tier2','Tier3','Tier4'].forEach(function(t){if(!tc[t])return;var c=TIER_C[t];out+='<span style="font-size:9px;font-weight:700;color:'+c+';white-space:nowrap">●'+tc[t]+'</span>';});
    if(tc['?'])out+='<span style="font-size:9px;color:#cbd5e1;white-space:nowrap">●'+tc['?']+'</span>';
    return out;
  }

  function rcCatDots(rows){
    var fs=0,is=0;rows.forEach(function(r){var c=rcCategory(r);if(c==='FS')fs++;else if(c==='IS')is++;});
    if(!fs&&!is)return '';
    var out='<div style="display:flex;gap:5px;justify-content:center;margin-top:2px">';
    if(fs)out+='<span style="font-size:8px;font-weight:700;color:'+RC_CAT_C.FS+';white-space:nowrap">FS'+fs+'</span>';
    if(is)out+='<span style="font-size:8px;font-weight:700;color:'+RC_CAT_C.IS+';white-space:nowrap">IS'+is+'</span>';
    out+='</div>';
    return out;
  }
  function rcCell(rows,key,isCurMo){

    var alpha=(0.12+ratio*0.6).toFixed(2);
    var bg='rgba(29,78,216,'+alpha+')';
    var txt=ratio>0.6?'#fff':'#1d4ed8';
    return '<td style="padding:6px;text-align:center"><button onclick="showRcDrawer(\''+key+'\')" title="クリックで案件一覧" style="width:100%;background:'+bg+';border:none;'+(isCurMo?'box-shadow:inset 0 0 0 2px #1d4ed8;':'')+'cursor:pointer;padding:9px 4px;border-radius:8px;transition:.15s"><span style="font-size:15px;font-weight:800;font-family:var(--mono);color:'+txt+'">'+n+'</span>'+rcCatDots(rows)+'</button></td>';

  function makePie(slices,sz){

    var cx=sz/2,cy=sz/2,r=sz/2-5,ir=r*0.54,a=-Math.PI/2;
    var svg='<svg width="'+sz+'" height="'+sz+'">';
    slices.forEach(function(sl){
      if(!sl.v)return;
      var da=sl.v/tot*2*Math.PI,ea=a+da,laf=da>Math.PI?1:0;
      var x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      var xi1=cx+ir*Math.cos(a),yi1=cy+ir*Math.sin(a),xi2=cx+ir*Math.cos(ea),yi2=cy+ir*Math.sin(ea);
      svg+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+laf+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ir+' '+ir+' 0 '+laf+' 0 '+xi1+' '+yi1+' Z" fill="'+sl.c+'" stroke="#fff" stroke-width="2.5"/>';

function hexToRgb(hex){var r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?parseInt(r[1],16)+','+parseInt(r[2],16)+','+parseInt(r[3],16):'0,121,192';}

// Normalize tier: "Tier1クロスセル対象企業" → "Tier1"
function normTier(v){var m=(v||'').match(/Tier\s*([1-4])/i);return m?'Tier'+m[1]:(v?v.trim():'');}
// 案件名から企業名を抽出: "YYYYMMDD_企業名様_テーマ" → "企業名"
function extractCoFromCaseName(nm){
  if(!nm)return '';
  var m=nm.match(/^\d{8}_(.+?)(?:様_|様\s|_)/);
  return m?m[1].trim():'';
}
// 案件名からテーマ部分を抽出: "YYYYMMDD_企業名様_テーマ" → "テーマ"
function extractThemeFromCaseName(nm){
  if(!nm)return '';
  var m=nm.match(/^\d{8}_.+?(?:様_|様\s|_)(.+)$/);
  return m?m[1].trim():'';
}
// 取引先名が議事録テキスト等の場合は案件名からフォールバック取得
function getCleanAccount(r){
  var acc=eGet(r,'account');
  var bad=!acc||acc.length>60||/^[#◎【■●▼▶〇※]/.test(acc)||acc.indexOf('【目的】')>=0||acc.indexOf('議事録')>=0||acc.indexOf('提示')>=0;
  if(bad){var nm=eGet(r,'name');return extractCoFromCaseName(nm)||acc;}
  return acc;
}
var SF_BASE='https://circulation.lightning.force.com/lightning/r/';
function sfContactLink(name,contactId){
  if(!contactId||!contactId.trim())return name;
  var url=SF_BASE+'Contact/'+contactId.trim()+'/view';
  return '<a href="'+url+'" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none;font-weight:inherit">'+name+'</a>';
}
function sfAccountLink(name,coName,directId){
  // directId: all_leadの取引先ID列から直接取得したID（優先）
  // coName: なければacplan_contactsのマップから検索（フォールバック）
  var aid=(directId&&directId.trim())?directId.trim():(window.SF_ACCOUNT_ID_MAP&&coName?(window.SF_ACCOUNT_ID_MAP[coName]||''):'');
  if(!aid)return name;
  var url=SF_BASE+'Account/'+aid+'/view';
  return '<a href="'+url+'" target="_blank" rel="noopener" style="color:var(--ink1);text-decoration:none;font-weight:inherit">'+name+'</a>';
}

    var leads=coLeads[co];
    var dispCo=co.replace(/株式会社\s*/g,'㈱').replace(/\s*株式会社/g,'㈱');

    h+='<span style="font-weight:700;font-size:13px;flex:1">'+sfAccountLink(dispCo,co,_coAid)+'</span>';
    if(badge)h+=badge;
    h+='<span style="font-size:10px;color:var(--ink3)">'+leads.length+'名</span>';
    h+='</summary>';
    h+='<div style="padding:8px 16px;background:#fff">';
    h+='<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h+='<thead><tr style="border-bottom:1px solid var(--bd)">';
    var hdrs=['氏名','部署クラス','部署','役職','ターゲット','Tier','メール','電話'];
    if(showHistory){hdrs.push('過去提案実績');hdrs.push('過去契約実績');}
    hdrs.forEach(function(l){h+='<th style="padding:3px 8px;text-align:left;font-size:10px;color:var(--ink2)">'+l+'</th>';});
    h+='</tr></thead><tbody>';
    leads.forEach(function(r){

      var cid=(col.contactId>=0?(r[col.contactId]||''):'').trim();
      var deptC=(col.deptClass>=0?(r[col.deptClass]||''):'').trim();
      var dept=(col.dept>=0?(r[col.dept]||''):'').trim();
      var role=(col.role>=0?(r[col.role]||''):'').trim();
      var tcat=(col.targetCat>=0?(r[col.targetCat]||''):'').trim();
      var tier=normTier((col.tier>=0?(r[col.tier]||''):'').trim());
      var email=(col.email>=0?(r[col.email]||''):'').trim();
      var phone=(col.phone>=0?(r[col.phone]||''):'').trim()||((col.mobile>=0?(r[col.mobile]||''):'').trim());
      var tcc=tcat.indexOf('決裁')>=0?'#7c3aed':tcat.indexOf('チャンピオン')>=0?'var(--blue)':tcat.indexOf('キーマン')>=0?'#f97316':'var(--ink3)';
      var tn=parseInt((tier||'').replace(/[^0-9]/g,''))||0;var tcs2=['','#0079C0','#1a7f37','#bf8700','#7c3aed'];var tc2=tcs2[tn]||'var(--ink3)';
      h+='<tr style="border-bottom:1px solid rgba(0,0,0,.04)">';

      h+='<td style="padding:3px 8px;font-size:10px;color:var(--ink2);white-space:nowrap">'+role+'</td>';
      h+='<td style="padding:3px 8px;font-size:9px">'+(tcat?'<span style="color:'+tcc+';font-weight:500">'+tcat+'</span>':'')+'</td>';

          var tip='提案'+pps.length+'件\n'+latP.slice(0,3).map(function(p){return (p.date||'').substring(0,7)+' '+p.caseName.substring(0,20);}).join('\n');

          if(themes.length)h+='<div style="margin-top:2px">'+themes.slice(0,3).map(function(t){return '<span style="font-size:8px;background:#fef3c7;color:#92400e;border-radius:3px;padding:0 4px;margin-right:2px">'+t+'</span>';}).join('')+'</div>';
          h+='</div></td>';
        } else { h+='<td style="padding:3px 8px"></td>'; }
        if(ccs&&ccs.length){
          var latC=ccs.slice().sort(function(a,b){return (b.endDate||b.startDate||'').localeCompare(a.endDate||a.startDate||'');});
          var cdS=(latC[0].endDate||latC[0].startDate||'').substring(0,7);
          var tip2='契約'+ccs.length+'件\n'+latC.slice(0,3).map(function(c){return (c.startDate||'').substring(0,7)+'〜'+(c.endDate||'').substring(0,7)+' '+c.caseName.substring(0,16);}).join('\n');
          h+='<td style="padding:3px 8px;font-size:9px"><span title="'+tip2.replace(/"/g,"'")+'" style="background:#d1fae5;color:#065f46;border-radius:4px;padding:1px 5px;font-weight:600;cursor:default;white-space:nowrap">🏆 '+cdS+'('+ccs.length+'件)</span></td>';
        } else { h+='<td style="padding:3px 8px"></td>'; }
      }
      h+='</tr>';
    });
    h+='</tbody></table></div></details>';
  });
  return h;
}

function renderAnalyticsView(col,activeCos,anyCasesCos,personProposalMap,personContractMap){
  var KOBAYASHI='小林 暁飛';
  var TEAM5_N=['徳永','栫','中村','岡部','福本','飯田','木曽','土田','小林'];
  function isTM(m){if(!m)return false;for(var i=0;i<TEAM5_N.length;i++)if(m.indexOf(TEAM5_N[i])>=0)return true;return false;}
  var SC={active:'#10b981',recycle:'#0079C0',wonDormant:'#7c3aed',dealDormant:'#f59e0b',none:'#94a3b8'};
  var SL={active:'稼働中★',recycle:'RC中🔄',wonDormant:'稼働後休眠😴',dealDormant:'商談後休眠💤',none:'未接点⬜'};
  var SK=['active','recycle','wonDormant','dealDormant','none'];
  function rcMonth(rd){if(!rd)return '';var mt=rd.match(/^(\d{4})[\/\-](\d{1,2})/);return mt?(parseInt(mt[2])+'月'):(rd.substring(0,7));}
  // 会社名の表記ゆれを吸収（株式会社/㈱/（株）/有限会社/㈲ など）
  function normCo(s){return (s||'').replace(/株式会社\s*/g,'').replace(/\s*株式会社/g,'').replace(/㈱/g,'').replace(/（株）/g,'').replace(/\(株\)/g,'').replace(/有限会社\s*/g,'').replace(/\s*有限会社/g,'').replace(/㈲/g,'').trim();}

  // 1. Build person-level maps from E_ROWS
  var personRcMap={},personAnyPhase08={},personAnyCase={};
  if(window.E_ROWS&&window.E_COL){
    var td0=new Date();td0.setHours(0,0,0,0);
    E_ROWS.forEach(function(r){
      var mem=eGet(r,'member');if(!isTM(mem))return;
      var acRaw=getCleanAccount(r).trim();if(!acRaw)return;
      var ac=normCo(acRaw); // 正規化した会社名をキーに使う
      var cc=(E_COL.custContact>=0?(r[E_COL.custContact]||''):'').trim();if(!cc)return;
      var ph=eGet(r,'curPh');var isP08=(ePh(ph)===8&&ph.indexOf('DEAD')<0);
      var rd=eGet(r,'recycleDate');
      var isFutureRc=false;
      if(rd){var rdD=new Date(rd.replace(/\//g,'-'));isFutureRc=!isNaN(rdD)&&rdD>=td0;}
      var info=isFutureRc?{recycleDate:rd,fsMember:mem,caseName:eGet(r,'name'),oppId:eGet(r,'oppId')}:null;
      cc.split(/[,、；;\/・]/).forEach(function(n){
        var nn=n.trim();if(!nn)return;
        var k1=ac+'__'+nn,k2=ac+'__'+nn.replace(/\s+/g,'');
        [k1,k2].forEach(function(k){
          if(isFutureRc){if(!personRcMap[k])personRcMap[k]=[];personRcMap[k].push(info);}
          if(isP08)personAnyPhase08[k]=true;
          personAnyCase[k]=true;
        });
      });
    });
  }

  // 2. Per-lead status
  function getStatus(co,nm,nmN){
    if(!co)return 'none';
    var nc=normCo(co);
    var k1=nc+'__'+nm,k2=nc+'__'+nmN;
    if(window.starContactMap){var sc1=co+'__'+nm,sc2=co+'__'+nmN;if(starContactMap[sc1]||starContactMap[sc2])return 'active';}
    if(personRcMap[k1]||personRcMap[k2])return 'recycle';
    if(personAnyPhase08[k1]||personAnyPhase08[k2])return 'wonDormant';
    if(personAnyCase[k1]||personAnyCase[k2])return 'dealDormant';
    return 'none';
  }


  // 3. Build member stats + drawer data buckets
  var memStats={};
  var drawerBuckets={}; // "m__s" → [{co,nm,tier,status,cid,dept,email,phone}]
  function addBucket(key,obj){if(!drawerBuckets[key])drawerBuckets[key]=[];drawerBuckets[key].push(obj);}
  L_DATA.forEach(function(r){
    var m=(col.member>=0?(r[col.member]||''):'').trim();
    // 担当者未設定は小林さん扱い
    if(!m||!isTM(m))m=KOBAYASHI;
    var co=(r[col.company]||'').trim();
    var ln=(col.lastName>=0?(r[col.lastName]||''):'').trim();
    var fn2=(col.firstName>=0?(r[col.firstName]||''):'').trim();
    var nm=(ln+' '+fn2).trim(),nmN=nm.replace(/\s+/g,'');
    var s=getStatus(co,nm,nmN);
    var t=normTier((col.tier>=0?(r[col.tier]||''):'').trim())||'未分類';
    var cid=(col.contactId>=0?(r[col.contactId]||''):'').trim();
    var dept=(col.dept>=0?(r[col.dept]||''):'').trim();
    var email=(col.email>=0?(r[col.email]||''):'').trim();
    var phone=(col.phone>=0?(r[col.phone]||''):col.mobile>=0?(r[col.mobile]||''):'').trim();
    var obj={co:co,nm:nm,tier:t,status:s,cid:cid,dept:dept,email:email,phone:phone,member:m};
    if(!memStats[m]){memStats[m]={total:0,tiers:{}};SK.forEach(function(k){memStats[m][k]=0;});}
    var ms=memStats[m];ms.total++;ms[s]++;
    if(!ms.tiers[t]){ms.tiers[t]={total:0};SK.forEach(function(k){ms.tiers[t][k]=0;});}
    ms.tiers[t].total++;ms.tiers[t][s]++;
    addBucket('bar__'+m+'__'+s,obj);
    addBucket('bar__'+m+'__all',obj);
    addBucket('bar__all__'+s,obj);
  });
  // Tier-level buckets (built after member filter is known, so defer)
  window._analyticsDrawerData=drawerBuckets;

  var L_TEAM_WITH_KOBAYASHI=(window.L_TEAM||[]).indexOf(KOBAYASHI)<0
    ?[KOBAYASHI].concat(window.L_TEAM||[]):(window.L_TEAM||[]);
  var displayMems=L_TEAM_WITH_KOBAYASHI.filter(function(m){return memStats[m];});

  // 4. Aggregate
  function aggStats(mList){
    var a={total:0};SK.forEach(function(k){a[k]=0;});
    mList.forEach(function(m){var ms=memStats[m];if(!ms)return;a.total+=ms.total;SK.forEach(function(k){a[k]+=(ms[k]||0);});});
    return a;
  }
  var tot=aggStats(displayMems);
  var selMs=L_ANALYTICS_MEMBER==='all'?tot:(memStats[L_ANALYTICS_MEMBER]||tot);
  var aggBase=L_ANALYTICS_MEMBER==='all'?displayMems:[L_ANALYTICS_MEMBER];
  var tierAgg={};
  aggBase.forEach(function(m){var ms=memStats[m];if(!ms)return;Object.keys(ms.tiers).forEach(function(t){
    if(!tierAgg[t]){tierAgg[t]={total:0};SK.forEach(function(k){tierAgg[t][k]=0;});}
    tierAgg[t].total+=ms.tiers[t].total;SK.forEach(function(k){tierAgg[t][k]+=(ms.tiers[t][k]||0);});
  });});

  // Build tier drawer buckets for current member selection
  aggBase.forEach(function(m){
    (drawerBuckets['bar__'+m+'__all']||[]).forEach(function(obj){
      addBucket('tier__'+obj.tier+'__'+obj.status,obj);
      addBucket('tier__'+obj.tier+'__all',obj);
    });
  });

  // 5. Recycle list
  var rcRows=[];var seenK={};
  L_DATA.forEach(function(r){
    var co=(r[col.company]||'').trim();if(!co)return;

function listBuilderDownloadCSV(){
  var rows=window._listBuilderFiltered||[];
  var col=window._listBuilderCol||window.L_COL;
  if(!rows.length||!col)return;
  function esc(v){v=String(v||'');if(v.indexOf(',')>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0)v='"'+v.replace(/"/g,'""')+'"';return v;}
  var getFullName2=function(r){var ln=(col.lastName>=0?(r[col.lastName]||''):'').trim();var fn=(col.firstName>=0?(r[col.firstName]||''):'').trim();if(ln||fn)return (ln+' '+fn).trim();if(col.fullName>=0)return (r[col.fullName]||'').trim();return '';};

  var lines=['﻿'+headers.join(',')];
  rows.forEach(function(r){
    var ln=(col.lastName>=0?(r[col.lastName]||''):'').trim();
    var fn2=(col.firstName>=0?(r[col.firstName]||''):'').trim();
    var co=(col.company>=0?(r[col.company]||''):'').trim();
    var tier=(col.tier>=0?(r[col.tier]||''):'').trim();
    var deptC=(col.deptClass>=0?(r[col.deptClass]||''):'').trim();

    var role=(col.role>=0?(r[col.role]||''):'').trim();

    var cid=(col.contactId>=0?(r[col.contactId]||''):'').trim();

    lines.push([ln,fn2,co,tier,deptC,dept,role,tcat,mem,email,phone,mobile,cid,aid].map(esc).join(','));
  });
  var csv=lines.join('\r\n');

  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  // ファイル名：アクティブなフィルター条件を反映
  var F2=window.L_LIST_FILTERS||{};
  var _parts=[];
  var _condLabels={pastclient:'稼働後企業',starContact:'稼働中CP',proposalCP:'提案中CP',anyCase:'商談歴あり',unproposed:'未提案',bant:'BANT',recentCase:'直近3ヶ月',hasEmail:'メールあり',excMM:'除外除く'};

  if(F2.tiers&&F2.tiers.length>0)_parts.push(F2.tiers.join(''));

  var _fname=(_parts.length>0?_parts.join('_'):'全リード')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.href=url;a.download=_fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);

}
