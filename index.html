function circuAcpDrawRelArrows(openId,coKey){
  var svg=document.getElementById('acpRelSvg');if(!svg)return;
  if(!_acpRelMode||_acpRelOpenId!==openId){svg.innerHTML='';return;}
  var container=document.getElementById(openId);if(!container){svg.innerHTML='';return;}
  var rels=[];try{rels=JSON.parse(localStorage.getItem(coKey+'_rels')||'[]');}catch(e){}
  _acpSvgRels=[];
  if(!rels.length){svg.innerHTML='';return;}
  // Person card positions (viewport-relative via getBoundingClientRect)
  var pos={};
  container.querySelectorAll('.acpt-person[data-pname]').forEach(function(card){
    var fn=card.dataset.pname;if(!fn)return;
    var r=card.getBoundingClientRect();
    var p={x:r.left+r.width/2,y:r.top+r.height/2};
    pos[fn]=p;pos[fn.replace(/\s+/g,'')]=p;
  });
  var clrs={positive:'#3b82f6',negative:'#ef4444',neutral:'#8b5cf6'};
  var parts=['<defs>'];
  rels.forEach(function(rel,ri){var c=clrs[rel.type]||'#94a3b8';parts.push('<marker id="am'+ri+'" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" fill="'+c+'"/></marker>');});
  parts.push('</defs>');
  rels.forEach(function(rel,ri){
    var from=pos[rel.from]||pos[(rel.from||'').replace(/\s+/g,'')];
    var to=pos[rel.to]||pos[(rel.to||'').replace(/\s+/g,'')];
    if(!from||!to)return;
    var c=clrs[rel.type]||'#94a3b8';
    var cx=(from.x+to.x)/2;
    var cy=(from.y+to.y)/2-Math.max(45,Math.abs(to.x-from.x)*0.3);
    var dash=rel.type==='neutral'?'stroke-dasharray="5 3"':'';
    parts.push('<path d="M'+from.x.toFixed(0)+','+from.y.toFixed(0)+' Q'+cx.toFixed(0)+','+cy.toFixed(0)+' '+to.x.toFixed(0)+','+to.y.toFixed(0)+'" stroke="'+c+'" stroke-width="1.8" fill="none" marker-end="url(#am'+ri+')" '+dash+'/>');
    var lbl=rel.label;var lx=cx,ly=cy-4;
    // Type label pill - always shown
    var _typeName={positive:'好意的',negative:'対立',neutral:'中立'}[rel.type]||rel.type;
    var _tw=Math.max(_typeName.length*12+16,36);
    parts.push('<rect x="'+((lx-_tw/2)).toFixed(0)+'" y="'+(ly-14).toFixed(0)+'" width="'+_tw.toFixed(0)+'" height="18" rx="9" fill="'+c+'" opacity="0.92"/>');
    parts.push('<text x="'+lx.toFixed(0)+'" y="'+(ly+2).toFixed(0)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" font-family="sans-serif">'+_typeName+'</text>');
    // Memo label below type pill
    if(lbl){var _mw=lbl.length*7+12;parts.push('<rect x="'+(lx-_mw/2).toFixed(0)+'" y="'+(ly+7).toFixed(0)+'" width="'+_mw.toFixed(0)+'" height="15" rx="4" fill="'+c+'" opacity="0.65"/>');parts.push('<text x="'+lx.toFixed(0)+'" y="'+(ly+19).toFixed(0)+'" text-anchor="middle" font-size="10" fill="#fff" font-family="sans-serif">'+lbl.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</text>');}
    // Delete button (×) - uses onclick with index
    var idx=_acpSvgRels.length;_acpSvgRels.push({id:rel.id,coKey:coKey,openId:openId});
    var dx=lx+_tw/2+12,dy=cy-4;
    parts.push('<circle cx="'+dx.toFixed(0)+'" cy="'+dy.toFixed(0)+'" r="8" fill="white" stroke="'+c+'" stroke-width="1.2" style="pointer-events:auto;cursor:pointer" onclick="circuAcpDeleteRelByIdx('+idx+')"/>');
    parts.push('<text x="'+dx.toFixed(0)+'" y="'+(dy+4).toFixed(0)+'" text-anchor="middle" font-size="12" fill="'+c+'" style="pointer-events:auto;cursor:pointer" onclick="circuAcpDeleteRelByIdx('+idx+')">×</text>');
  });
  svg.style.display='block';
  svg.innerHTML=parts.join('');
}

  if(_acpPersonDragSrc)return;

function circuMmCsvLoad(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    var lines=text.split(/\r?\n/);
    var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
    // 列を自動検出
    var emailIdx=-1,nameIdx=-1,lastIdx=-1,firstIdx=-1;
    headers.forEach(function(h,i){
      var hl=h.toLowerCase();
      if(emailIdx<0&&(hl.indexOf('mail')>=0||hl.indexOf('メール')>=0||hl==='email'))emailIdx=i;
      if(lastIdx<0&&(hl==='姓'||hl.indexOf('last')>=0||hl==='苗字'))lastIdx=i;
      if(firstIdx<0&&(hl==='名'||hl.indexOf('first')>=0))firstIdx=i;
      if(nameIdx<0&&(hl.indexOf('氏名')>=0||hl.indexOf('名前')>=0||hl==='name'))nameIdx=i;
    });
    var values=[];
    function addUniq(v){v=(v||'').trim();if(v&&values.indexOf(v)<0)values.push(v);}
    for(var i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      var row=lines[i].split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});
      // メールアドレスがあれば登録
      if(emailIdx>=0&&row[emailIdx])addUniq(row[emailIdx]);
      // 姓名があれば「姓 名」と「姓名」両方登録（メールがなくても）
      var nm='';
      if(lastIdx>=0||firstIdx>=0){
        var ln2=lastIdx>=0?(row[lastIdx]||''):'';
        var fn2=firstIdx>=0?(row[firstIdx]||''):'';
        nm=(ln2+' '+fn2).trim();
      } else if(nameIdx>=0){nm=(row[nameIdx]||'').trim();}
      if(nm){addUniq(nm);addUniq(nm.replace(/\s+/g,''));}// スペースあり・なし両方
    }
    var existing=[];try{existing=JSON.parse(localStorage.getItem('circu_mm_exclude')||'[]');}catch(e){}
    var merged=existing.slice();
    values.forEach(function(v){if(merged.indexOf(v)<0)merged.push(v);});
    localStorage.setItem('circu_mm_exclude',JSON.stringify(merged));
    alert('✅ '+values.length+'件を読み込みました（合計 '+merged.length+'件）');
    input.value='';
    renderLeads(document.getElementById('M'));
  };
  reader.readAsText(file,'UTF-8');
}

function renderISPipeline(col,activeCos,anyCasesCos,pastClientCos){
  var today=new Date();today.setHours(0,0,0,0);
  var thisYM=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  window.IS_VIEW=window.IS_VIEW||'future';
  window.IS_MEMBER_FILTER=window.IS_MEMBER_FILTER||'all';
  window.IS_TIER_FILTER=window.IS_TIER_FILTER||'all';
  window.IS_CS_FILTER=window.IS_CS_FILTER||'all';
  window.IS_APPROACH_FILTER=window.IS_APPROACH_FILTER||'all';
  var CS={
    active:{label:'🏭 稼働中',color:'#10b981',bg:'#d1fae5'},
    past:{label:'🔄 稼働後',color:'#0891b2',bg:'#e0f2fe'},
    dormant:{label:'😴 休眠',color:'#f59e0b',bg:'#fef3c7'},
    unproposed:{label:'🔍 未提案',color:'#7c3aed',bg:'#ede9fe'}
  };
  function getCS(co){
    if(!co)return 'unproposed';
    if(activeCos[co])return 'active';
    if(pastClientCos[co])return 'past';
    if(anyCasesCos[co])return 'dormant';
    return 'unproposed';
  }
  // YM文字列(YYYY/MM)を返す — renderNextActionHeatmapと同じ方式
  function parseNAD(r){
    var v=(col.nextActionDate>=0?(r[col.nextActionDate]||''):'').trim();if(!v)return null;
    var m=v.match(/(\d{4})[\/-](\d{1,2})/);
    if(m)return m[1]+'/'+(m[2].length===1?'0':'')+m[2];
    return null;
  }
  // Build rows
  var allRows=[];
  L_DATA.forEach(function(r){
    var co=(r[col.company]||'').trim();
    var mem=(col.member>=0?(r[col.member]||''):'').trim();
    var ln=(col.lastName>=0?(r[col.lastName]||''):'').trim();
    var fn=(col.firstName>=0?(r[col.firstName]||''):'').trim();
    var nm=(ln+' '+fn).trim();
    var cid=(col.contactId>=0?(r[col.contactId]||''):'').trim();
    var tier=normTier((col.tier>=0?(r[col.tier]||''):'').trim());
    var status=(col.approachStatus>=0?(r[col.approachStatus]||''):col.status>=0?(r[col.status]||''):'').trim();
    var la=(col.la>=0?(r[col.la]||''):'').trim();
    var naYMraw=parseNAD(r);
    var naStr=(col.nextActionDate>=0?(r[col.nextActionDate]||''):'').trim();
    var naYM=naYMraw||'';
    var isFuture=!!(naYM&&naYM>=thisYM);
    var isThisMonth=naYM===thisYM;
    var daysUntil=null;
    var csKey=getCS(co);
    allRows.push({co:co,mem:mem,nm:nm,cid:cid,tier:tier,status:status,la:la,naStr:naStr,isFuture:isFuture,naYM:naYM,isThisMonth:isThisMonth,csKey:csKey});
  });
  function applyF(rows){
    return rows.filter(function(p){
      if(window.IS_MEMBER_FILTER!=='all'&&p.mem!==window.IS_MEMBER_FILTER)return false;
      if(window.IS_TIER_FILTER!=='all'&&p.tier!==window.IS_TIER_FILTER)return false;
      if(window.IS_CS_FILTER!=='all'&&p.csKey!==window.IS_CS_FILTER)return false;
      if(window.IS_APPROACH_FILTER!=='all'&&p.status!==window.IS_APPROACH_FILTER)return false;
      return true;
    });
  }
  var filteredAll=applyF(allRows);
  var filteredFuture=applyF(allRows.filter(function(p){return p.isFuture;}));
  var displayRows=window.IS_VIEW==='future'?filteredFuture:filteredAll;
  displayRows.sort(function(a,b){
    if(a.naYM&&b.naYM)return a.naYM.localeCompare(b.naYM);
    if(a.naYM)return -1;if(b.naYM)return 1;return 0;
  });
  // FS members & tiers
  var fsMems={};allRows.forEach(function(p){if(p.mem)fsMems[p.mem]=true;});
  var fsList=Object.keys(fsMems).sort(function(a,b){return a.localeCompare(b,'ja');});
  var tierSet={};var tierList=[];
  allRows.forEach(function(p){if(p.tier&&!tierSet[p.tier]){tierSet[p.tier]=true;tierList.push(p.tier);}});
  tierList.sort(function(a,b){var ta=a.replace(/[^0-9]/g,''),tb=b.replace(/[^0-9]/g,'');return ta&&tb?parseInt(ta)-parseInt(tb):a.localeCompare(b,'ja');});
  // Tier区分ヘルパー
  function isFSTier(p){var t=p.tier;return t==='Tier1'||t==='Tier2';}
  var fsRows=allRows.filter(isFSTier);     // Tier1/2
  var t34Rows=allRows.filter(function(p){return !isFSTier(p);});  // Tier3/4
  // KPI counts (Tier1/2ベース)
  var fsFiltered=applyF(fsRows);
  var fsFuture=fsFiltered.filter(function(p){return p.isFuture;}).length;
  var fsThisMonth=fsFiltered.filter(function(p){return p.isThisMonth;}).length;
  // KPI counts (Tier3/4ベース)
  var t34Filtered=applyF(t34Rows);
  var t34Future=t34Filtered.filter(function(p){return p.isFuture;}).length;
  var t34ThisMonth=t34Filtered.filter(function(p){return p.isThisMonth;}).length;
  // サマリー用フィルター（メンバー・Tier除外でCS/アプローチSTは適用）
  function applyF_summary(rows){
    return rows.filter(function(p){
      if(window.IS_CS_FILTER!=='all'&&p.csKey!==window.IS_CS_FILTER)return false;
      if(window.IS_APPROACH_FILTER!=='all'&&p.status!==window.IS_APPROACH_FILTER)return false;
      if(window.IS_VIEW==='future'&&!p.isFuture)return false;
      return true;
    });
  }
  function applyF_noCS(rows){

function renderLeads(M){

  var col=L_COL,today=new Date();today.setHours(0,0,0,0);

    if(col.member<0)return true;

  }
  var confirmed=L_DATA.filter(isConfirmed);
  // Unique accounts
  function uniqCo(rows){var s={};rows.forEach(function(r){var co=(r[col.company]||'').trim();if(co)s[co]=true;});return Object.keys(s).length;}

  var activeCos={};    // 取引先名 → true (現在稼働中: phase08かつ終了日未来)
  var anyCasesCos={};  // 取引先名 → true (過去含め何らかの案件あり = 接点あり)

  var starContactMap=window.starContactMap;
  var coCases={};        // 取引先名 → [稼働中case rows]
  var propCos={};        // 取引先名 → true (提案中: phase01-07)

    E_ROWS.forEach(function(r){

      var ac=eGet(r,'account').trim();if(!ac)return;
      anyCasesCos[ac]=true;

    E_ROWS.forEach(function(r){

      var ph=eGet(r,'curPh');if(ePh(ph)!==8||ph.indexOf('DEAD')>=0)return;
      var ed=eGet(r,'endDate');

      var ac=eGet(r,'account').trim();if(!ac)return;
      activeCos[ac]=true;
      var _nm=eGet(r,'name');var _th=eGet(r,'theme');
      if(!coCases[ac])coCases[ac]=[];coCases[ac].push({name:_nm||_th||'',ck:eGetN(r,'ck'),custContact:eGet(r,'custContact'),startDate:eGet(r,'startDate'),member:eGet(r,'member'),oppId:eGet(r,'oppId'),theme:_th});

    // Recycle case rows (all_cases) — 案件名を SF 商談(Opportunity)リンク化

    var g=function(r,i){return (i>=0&&i<r.length)?(r[i]||'').trim():'';};
    var SFOPP='https://circulation.lightning.force.com/lightning/r/Opportunity/';
    h+='<thead><tr style="border-bottom:2px solid var(--bd)">';
    ['取引先','案件名(SF)','区分','リサイクル選択','リサイクル希望日','ターゲット','最終P','顧客担当者'].forEach(function(l){h+='<th style="padding:6px 8px;text-align:left;font-size:9px;color:var(--ink3);font-weight:600;white-space:nowrap">'+l+'</th>';});
    h+='</tr></thead><tbody>';
    rows.forEach(function(r,idx){
      var co=g(r,col.account).replace(/株式会社\s*/g,'㈱').replace(/\s*株式会社/g,'㈱');
      var nm=g(r,col.name);
      var oid=g(r,col.oppId);
      var nmLink=oid?('<a href="'+SFOPP+oid+'/view" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none">'+(nm||'(案件名なし)')+'</a>'):(nm||'(案件名なし)');
      var rt=g(r,col.recycle);
      var rd=g(r,col.recycleDate);
      var tgt=g(r,col.recycleTarget);
      var lp=g(r,col.lastPh);
      var cc=g(r,col.custContact);
      var cat=/FS/i.test(rt)?'FS':(/IS/i.test(rt)?'IS':null);
      var catBadge=cat?('<span style="font-size:9px;font-weight:700;color:#fff;background:'+(cat==='FS'?'#0891b2':'#db2777')+';padding:2px 7px;border-radius:10px;white-space:nowrap">'+cat+'</span>'):'<span style="font-size:9px;color:var(--ink3)">−</span>';
      h+='<tr style="border-bottom:1px solid rgba(0,0,0,.04);'+(idx%2===0?'background:var(--bg)':'')+'">';
      h+='<td style="padding:6px 8px;font-size:10px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="'+co+'">'+co+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis" title="'+nm+'">'+nmLink+'</td>';
      h+='<td style="padding:6px 8px;white-space:nowrap">'+catBadge+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;color:var(--blue);white-space:nowrap">'+rt+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;font-family:var(--mono);font-weight:600;color:#7057a3;white-space:nowrap">'+(rd||'未設定')+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;color:var(--ink2);white-space:nowrap">'+tgt+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;text-align:center;white-space:nowrap">'+lp+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;color:var(--ink2)">'+cc+'</td>';
      h+='</tr>';
    });
  } else {
    // Case rows (recycle heatmap)
    h+='<thead><tr style="border-bottom:2px solid var(--bd)">';
    ['取引先','案件名','種別','リサイクル希望日','最終P','CK','顧客担当者'].forEach(function(l){h+='<th style="padding:6px 8px;text-align:left;font-size:9px;color:var(--ink3);font-weight:600;white-space:nowrap">'+l+'</th>';});
    h+='</tr></thead><tbody>';
    rows.forEach(function(r,idx){
      var acc=getCleanAccount(r).replace(/株式会社\s*/g,'㈱').replace(/\s*株式会社/g,'㈱');
      var nm=eGet(r,'name');
      var rt=eGet(r,'recycle');
      var rd=eGet(r,'recycleDate');
      var lp=eGet(r,'lastPh');
      var ck=eGetN(r,'ck');
      var cc=eGet(r,'custContact');
      var rdStyle=(rd&&rd>='2026')?'color:#7c3aed;font-weight:600':'color:var(--ink3)';
      h+='<tr style="border-bottom:1px solid rgba(0,0,0,.04);'+(idx%2===0?'background:#fafafa':'')+'">';
      h+='<td style="padding:6px 8px;font-size:10px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="'+acc+'">'+acc+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis" title="'+nm+'">'+nm+'</td>';
      h+='<td style="padding:6px 8px;font-size:9px;white-space:nowrap;color:var(--blue)">'+rt+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;font-family:var(--mono);white-space:nowrap;'+rdStyle+'">'+rd+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;text-align:center">'+lp+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;text-align:right;font-family:var(--mono)">'+(ck>0?eFmt(ck)+'万':'−')+'</td>';
      h+='<td style="padding:6px 8px;font-size:10px;color:var(--ink2)">'+cc+'</td>';
      h+='</tr>';
    });
  }
  h+='</tbody></table>';
  document.getElementById('rc-drawer-body').innerHTML=h;
  document.getElementById('rc-drawer').classList.add('open');
  document.getElementById('rc-drawer-overlay').classList.add('open');
}
function closeRcDrawer(){
  var dr=document.getElementById('rc-drawer');if(dr)dr.classList.remove('open');
  var ov=document.getElementById('rc-drawer-overlay');if(ov)ov.classList.remove('open');
}

// ===== LEAD HISTORY / MEMO MODALS =====
function _lModal(innerHtml){
  var ov=document.getElementById('_lmod-ov');
  if(!ov){
    ov=document.createElement('div');
    ov.id='_lmod-ov';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    document.body.appendChild(ov);
  }
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:12px;padding:20px 24px;max-width:480px;width:90%;max-height:70vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative';
  box.innerHTML=innerHtml;
  ov.innerHTML='';
  ov.appendChild(box);
  var cl=document.createElement('button');
  cl.style.cssText='position:absolute;top:10px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#666;line-height:1';
  cl.textContent='×';
  cl.onclick=function(){ov.remove();};
  box.appendChild(cl);
}
function showLeadHistory(co,fn,type){
  var propMap=window._lPropMap||{};
  var contMap=window._lContMap||{};
  var keyS=co+'__'+fn;
  var keyN=co+'__'+fn.replace(/\s+/g,'');
  var props=(propMap[keyS]||propMap[keyN])||[];
  var conts=(contMap[keyS]||contMap[keyN])||[];
  var SFOP='https://circulation.lightning.force.com/lightning/r/Opportunity/';
  var h='<div style="font-weight:700;font-size:14px;margin-bottom:14px;padding-right:24px">'+fn+' ／ '+co+'</div>';
  if(type==='cont'||type==='both'){
    h+='<div style="font-size:11px;font-weight:600;color:#10b981;margin-bottom:6px">📄 契約歴（'+conts.length+'件）</div>';
    if(!conts.length){h+='<div style="font-size:11px;color:#888;margin-bottom:10px">なし</div>';}
    conts.forEach(function(c){
      h+='<div style="background:#ecfdf5;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px">';
      h+='<div style="font-weight:600"><a href="'+SFOP+c.oppId+'/view" target="_blank" style="color:#065f46;text-decoration:none">'+c.caseName+'</a></div>';
      if(c.startDate||c.endDate){h+='<div style="color:#666;margin-top:2px;font-size:10px">'+(c.startDate||'')+(c.endDate?' 〜 '+c.endDate:'')+'</div>';}
      h+='</div>';
    });
  }
  if(type==='prop'||type==='both'){
    h+='<div style="font-size:11px;font-weight:600;color:#0079C0;margin-bottom:6px;'+(type==='both'?'margin-top:10px':'')+'">💼 提案歴（'+props.length+'件）</div>';
    if(!props.length){h+='<div style="font-size:11px;color:#888;margin-bottom:10px">なし</div>';}
    props.forEach(function(p){
      h+='<div style="background:#f0f9ff;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px">';
      h+='<div style="font-weight:600"><a href="'+SFOP+p.oppId+'/view" target="_blank" style="color:#0c4a6e;text-decoration:none">'+p.caseName+'</a></div>';
      if(p.date){h+='<div style="color:#666;margin-top:2px;font-size:10px">提案日: '+p.date+'</div>';}
      h+='</div>';
    });
  }
  _lModal(h);
}
function showLeadMemo(co,fn){
  var key='lmemo_'+co+'__'+fn;
  var cur=localStorage.getItem(key)||'';
  var h='<div style="font-weight:700;font-size:14px;margin-bottom:8px;padding-right:24px">📝 アクションメモ</div>';
  h+='<div style="font-size:11px;color:#666;margin-bottom:10px">'+fn+' ／ '+co+'</div>';
  h+='<textarea id="_lmemo-ta" style="width:100%;height:120px;border:1px solid #d1d5db;border-radius:6px;padding:8px;font-size:12px;resize:vertical;box-sizing:border-box;font-family:inherit"></textarea>';
  h+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">';
  h+='<button id="_lmemo-del" style="padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:12px">削除</button>';
  h+='<button id="_lmemo-sav" style="padding:6px 14px;background:#0079C0;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">保存</button>';
  h+='</div>';
  _lModal(h);
  document.getElementById('_lmemo-ta').value=cur;
  document.getElementById('_lmemo-del').onclick=function(){
    localStorage.removeItem(key);
    var ov=document.getElementById('_lmod-ov');if(ov)ov.remove();
  };
  document.getElementById('_lmemo-sav').onclick=function(){
    var ta=document.getElementById('_lmemo-ta');
    if(ta)localStorage.setItem(key,ta.value);
    var ov=document.getElementById('_lmod-ov');if(ov)ov.remove();
  };
}
document.addEventListener('click',function(e){
  var h=e.target.closest('._lead-hist');
  if(h){e.stopPropagation();showLeadHistory(h.dataset.co,h.dataset.fn,h.dataset.type);return;}
  var m=e.target.closest('._lead-memo');
  if(m){e.stopPropagation();showLeadMemo(m.dataset.co,m.dataset.fn);}
});


function fetchFromGAS(){
  console.log('>>> fetchFromGAS (standalone) called');
  SYNC_STATUS='syncing';updateSyncBadge();
  var M=document.getElementById('M');
  M.innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)"><div class="spinner" style="width:32px;height:32px;margin:0 auto 16px"></div>データを取得中...</div>';
  Promise.all([
    fetch(GAS_URL+'?sheet=acplan_cases').then(function(r){return r.text();}),
    fetch(GAS_URL+'?sheet=all_lead').then(function(r){return r.text();}),
    fetch(GAS_URL+'?sheet=acplan_pn').then(function(r){return r.text();}),
    fetch(GAS_URL+'?sheet=pn_new').then(function(r){return r.text();}),
    fetch(GAS_URL+'?sheet=all_cases').then(function(r){return r.text();}).catch(function(){return '';}),
    loadSharedState()// チーム共有の編集データ（アカプラ等）を描画前に反映
  ]).then(function(res){
    // acplan_cases → E_ROWS, E_COL
    var cf=pCSV(res[0]);
    E_COL=eDetect(cf.h);window.E_HEADERS=cf.h;
    var TEAM5_N=['徳永','栫','中村','岡部','福本','飯田','木曽','土田','小林'];
    function isT(m){if(!m)return false;for(var i=0;i<TEAM5_N.length;i++)if(m.indexOf(TEAM5_N[i])>=0)return true;return false;}
    E_ROWS=cf.r.filter(function(r){return isT((E_COL.member>=0?r[E_COL.member]:'').trim());});

    // all_cases → RC_ROWS, RC_COL（リサイクル列を含む案件レポート。リサイクル分析に使用）
    if(res[4]&&res[4].length>50){
      var rcf=pCSV(res[4]);
      RC_COL=eDetect(rcf.h);window.RC_HEADERS=rcf.h;
      if(RC_COL.caseType<0)RC_COL.caseType=22; // all_cases AS列（案件種別テキスト）
      RC_ROWS=rcf.r.filter(function(r){return isT((RC_COL.member>=0?r[RC_COL.member]:'').trim());});
      console.log('all_cases: '+RC_ROWS.length+' rows / recycle col='+RC_COL.recycle+' recycleDate col='+RC_COL.recycleDate);
    } else {RC_ROWS=[];RC_COL={};}

    // all_lead → L_DATA, L_HEADER, L_COL
    var lf=pCSV(res[1]);
    L_HEADER=lf.h;L_DATA=lf.r;L_COL=lDetectCols(lf.h);
    L_LOADING=false;L_LOADED=true;
    console.log('leads: '+L_DATA.length+' rows');

    // acplan_pn → E_PN2, E_PN_COL
    var pf=pCSV(res[2]);E_PN2=pf.r;window.E_PN_H=pf.h;
    window.E_PN_COL={member:-1,name:-1,phase:-1,oppId:-1,bill:-1,pay:-1,startDate:-1,endDate:-1,cancel:-1,keizoku:-1,keizokuPro:-1};
    if(pf.h)pf.h.forEach(function(hv,pi){
      hv=hv.trim();
      if(hv==='主担当者')window.E_PN_COL.member=pi;
      else if(hv==='案件名')window.E_PN_COL.name=pi;
      else if(hv==='フェーズ')window.E_PN_COL.phase=pi;
      else if(hv.match(/案件.?ID|Opportunity ID/))window.E_PN_COL.oppId=pi;
      else if(hv.match(/月額.*顧客請求|月額.*請求額/))window.E_PN_COL.bill=pi;
      else if(hv.match(/月額.*専門家|月額.*支払/))window.E_PN_COL.pay=pi;
      else if(hv==='契約開始日')window.E_PN_COL.startDate=pi;
      else if(hv==='契約終了日')window.E_PN_COL.endDate=pi;
      else if(hv==='解約日')window.E_PN_COL.cancel=pi;
      else if(hv.indexOf('継続意向')>=0&&hv.indexOf('顧客')>=0)window.E_PN_COL.keizoku=pi;
      else if(hv.indexOf('継続意向')>=0&&hv.indexOf('プロ')>=0)window.E_PN_COL.keizokuPro=pi;
      else if(hv.indexOf('継続意向')>=0&&window.E_PN_COL.keizoku<0)window.E_PN_COL.keizoku=pi;
    });

    // pn_new → E_PN_NEW, E_PN_NEW_COL
    var pn=pCSV(res[3]);window.E_PN_NEW=pn.r;window.E_PN_NEW_H=pn.h;
    var nc={member:-1,sub:-1,account:-1,name:-1,type:-1,ym:-1,bill:-1,pay:-1,billM:-1,payM:-1,pk:-1,start:-1,end:-1,expert:-1,bill2:-1,pay2:-1,status:-1,oppId:-1};
    if(pn.h)pn.h.forEach(function(nv,ni){
      nv=nv.trim();
      if(nv.indexOf('主担当者')>=0)nc.member=ni;
      else if(nv.indexOf('副担当者')>=0)nc.sub=ni;
      else if(nv==='取引先名')nc.account=ni;
      else if(nv==='案件名')nc.name=ni;
      else if(nv==='新規/継続')nc.type=ni;
      else if(nv==='対象年月')nc.ym=ni;
      else if(nv.indexOf('[月額]顧客請求')>=0)nc.billM=ni;
      else if(nv.indexOf('[月額]専門家支払')>=0)nc.payM=ni;
      else if(nv.indexOf('請求小計')>=0||nv.indexOf('①顧客請求')>=0)nc.bill=ni;
      else if(nv.indexOf('支払小計')>=0||nv.indexOf('①専門家支払')>=0)nc.pay=ni;
      else if(nv==='PK')nc.pk=ni;
      else if(nv==='契約開始日')nc.start=ni;
      else if(nv==='契約終了日')nc.end=ni;
      else if(nv.indexOf('専門家氏名')>=0)nc.expert=ni;
      else if(nv==='契約ステータス')nc.status=ni;
      else if(nv.match(/案件.?ID/))nc.oppId=ni;
    });
    window.E_PN_NEW_COL=nc;

    SYNC_STATUS='live';updateSyncBadge();
    renderLeads(M);
  }).catch(function(err){
    console.warn('GAS fetch failed:', err);
    SYNC_STATUS='offline';updateSyncBadge();
    document.getElementById('M').innerHTML='<div style="padding:40px;text-align:center"><div style="font-size:16px;margin-bottom:12px;color:var(--red)">⚠️ データ取得エラー</div><div style="color:var(--ink3);font-size:12px">GAS APIへの接続に失敗しました。<br>ローカル環境ではCORSエラーが発生します。<br>GitHub Pages経由でアクセスしてください。</div></div>';
  });
}

document.addEventListener('DOMContentLoaded', fetchFromGAS);
</script>
